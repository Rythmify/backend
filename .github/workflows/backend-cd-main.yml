name: Backend — Main CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    name: Build, Push & Deploy (Production)
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      - name: Run migrations against Azure PostgreSQL (prod)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate:up

      - name: Run seeds against Azure PostgreSQL (prod)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -f seeds/seed.sql || { echo "MISSING: seeds/seed.sql"; exit 1; }
          psql $DATABASE_URL -f seeds/seed.sql
          echo "Seeding complete."

      - name: Register ACR credentials with Container App
        run: |
          az containerapp registry set \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Smoke check prod deployment
        run: |
          PROD_URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Prod URL: https://$PROD_URL"
          for i in $(seq 1 15); do
            response=$(curl -sf "https://$PROD_URL/api/v1/health") && echo "Health OK: $response" && break
            echo "Attempt $i — not ready, waiting 10s..."
            sleep 10
          done
          curl -sf "https://$PROD_URL/api/v1/health" | grep -q '"status":"ok"' || { echo "Prod smoke check failed."; exit 1; }
          echo "Production deployment smoke check passed."

      - name: Collect deployment logs on failure
        if: failure()
        run: |
          az containerapp logs show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --tail 50 || true
