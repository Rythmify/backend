          minLength: 1
          maxLength: 500
          example: Totally agree!

  responses:
    # --------------------------
    # Shared (Global)
    # Quick Reference
    # Omar Hamdy
    # --------------------------
    ValidationError:
      description: Validation / bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_FAILED
              message: Validation failed
              details:
                - field: email
                  issue: Invalid email format

    Unauthorized:
      description: Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: AUTH_TOKEN_MISSING
              message: Authorization header missing

    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred

    TrackProcessingFailed:
      description: Track transcoding failed — cannot be played.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_PROCESSING_FAILED
              message: Track processing failed

    FileTooLarge:
      description: Uploaded file exceeds the maximum allowed size.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_FILE_TOO_LARGE
              message: File size exceeds the allowed limit

    UnsupportedMediaType:
      description: Uploaded file format is not supported.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_INVALID_FILE_TYPE
              message: Unsupported file format

    RateLimited:
      description: Too many requests (rate limit exceeded).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests

    UnprocessableEntity:
      description: CAPTCHA failed or business rule validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: BUSINESS_RULE_VIOLATION
              message: CAPTCHA validation failed

    # ----------------------------------------------------------
    # Parameters — Reusable path/query parameters.
    #
    # Example:
    # TrackId:
    #   name: id
    #   in: path
    #   required: true
    #   schema:
    #     type: string
    #     format: uuid
    # ----------------------------------------------------------
    Forbidden:
      description: Authenticated but not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: PERMISSION_DENIED
              message: You do not have permission to perform this action.

    NotFound:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: Resource not found.

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      description: Unique identifier of the target user.
      schema:
        type: string
        format: uuid
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    TrackId:
      name: track_id
      in: path
      required: true
      description: Unique identifier of the target track.
      schema:
        type: string
        format: uuid
        example: e5f6a7b8-c9d0-1234-efab-567890abcdef

    CommentId:
      name: comment_id
      in: path
      required: true
      description: Unique identifier of the target comment.
      schema:
        type: string
        format: uuid
        example: c1d2e3f4-a5b6-7890-abcd-ef1234567890

    PlaylistId:
      name: playlist_id
      in: path
      required: true
      description: Unique identifier of the target playlist.
      schema:
        type: string
        format: uuid
        example: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa

    Limit:
      name: limit
      in: query
      required: false
      description: Page size.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20

    Offset:
      name: offset
      in: query
      required: false
      description: Pagination offset.
      schema:
        type: integer
        minimum: 0
        default: 0
        example: 0
