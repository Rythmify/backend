    # ==========================================================
    # Module 11 — Moderation & Admin Dashboard (Schemas)
    # ==========================================================

    ReportRequest:
      # [F15] Upgraded from track-only to multi-resource reporting
      type: object
      required: [resource_type, resource_id, reason]
      properties:
        resource_type:
          type: string
          enum: [track, user]
          description: The type of resource being reported.
          example: track
        resource_id:
          type: string
          format: uuid
          description: UUID of the track or user being reported.
          example: a1234567-89ab-cdef-0123-456789abcdef
        reason:
          type: string
          enum: [copyright, inappropriate, spam, impersonation]
          description: |
            Reason for the report.
            - `copyright` and `inappropriate` are valid for tracks.
            - `inappropriate`, `spam`, and `impersonation` are valid for users.
            - `copyright` is NOT valid when `resource_type` is `user`.
          example: copyright
        description:
          type: string
          maxLength: 1000
          description: Optional additional details about the report.
          example: This track uses unlicensed material from XYZ artist.

    Report:
      # [F16] resource_type + resource_id instead of track_id only
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: r1234567-89ab-cdef-0123-456789abcdef
        resource_type:
          type: string
          enum: [track, user]
          example: track
        resource_id:
          type: string
          format: uuid
          example: a1234567-89ab-cdef-0123-456789abcdef
        reason:
          type: string
          enum: [copyright, inappropriate, spam, impersonation]
          example: copyright
        status:
          type: string
          enum: [pending, resolved, dismissed]
          example: pending
        created_at:
          type: string
          format: date-time
      required: [id, resource_type, resource_id, reason, status, created_at]

    ReportDetailed:
      allOf:
        - $ref: '#/components/schemas/Report'
        - type: object
          properties:
            description:
              type: string
              example: Unlicensed use of XYZ material.
            resource:
              type: object
              description: |
                Snapshot of the reported resource.
                Contains `id` + `title` for tracks, or `id` + `display_name` for users.
              properties:
                id:
                  type: string
                  format: uuid
                title:
                  type: string
                  nullable: true
                  description: Present when resource_type is track
                display_name:
                  type: string
                  nullable: true
                  description: Present when resource_type is user
            reported_by:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                display_name:
                  type: string

    AnalyticsSummary:
      type: object
      properties:
        period:
          type: string
          description: Analytics time period
          example: month
        active_users:
          type: integer
          description: Users who logged in during the period
          example: 12400
        new_registrations:
          type: integer
          example: 870
        total_tracks:
          type: integer
          example: 45200
        total_plays:
          type: integer
          example: 980000
        play_through_rate:
          type: number
          format: float
          description: Ratio of completed plays to total plays (0–1)
          example: 0.67
        storage_used_gb:
          type: number
          format: float
          example: 312.4
        storage_limit_gb:
          type: number
          format: float
          example: 1000.0
        pending_reports:
          type: integer
          example: 14
        suspended_accounts:
          type: integer
          example: 22

    # ==========================================================
    # Module 12 — Premium Subscription & Payments (Schemas)
    # ==========================================================

    SubscriptionPlanName:
      type: string
      description: |
        Available subscription plans on the platform.

        free:
          - Up to 3 track uploads
          - Up to 2 playlists
          - Standard streaming

        premium:
          - Unlimited track uploads
          - Unlimited playlists
          - Mocked offline listening capability
      enum:
        - free
        - premium

    SubscriptionPlan:
      type: object
      properties:
        subscription_plan_id:
          type: integer
          description: Internal subscription plan ID.
          example: 2
        name:
          $ref: '#/components/schemas/SubscriptionPlanName'
        price:
          type: string
          description: Decimal amount represented as a string.
          example: '4.99'
        duration_days:
          type: integer
          nullable: true
          description: Billing cycle duration in days. Null for free plan.
          example: 30
        track_limit:
          type: integer
          nullable: true
          description: Maximum number of uploaded tracks allowed. Null means unlimited.
          example: 3
        playlist_limit:
          type: integer
          nullable: true
          description: Maximum number of playlists allowed. Null means unlimited.
          example: 2
      required:
        - subscription_plan_id
        - name
        - price
        - duration_days
        - track_limit
        - playlist_limit

    SubscriptionPlanListData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionPlan'
      required:
        - items

    SubscriptionPlanListResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SubscriptionPlanListData'
        message:
          type: string
          example: Subscription plans fetched successfully.
      required:
        - data

    MySubscription:
      type: object
      properties:
        user_subscription_id:
          type: integer
          description: Internal user subscription ID.
          example: 15
        user_id:
          type: string
          format: uuid
          description: User ID that owns this subscription.
          example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
        status:
          $ref: '#/components/schemas/UserSubscriptionStatus'
        start_date:
          type: string
          format: date
          description: Subscription start date.
          example: '2026-03-01'
        end_date:
          type: string
          format: date
          nullable: true
          description: Subscription end date. Null may be used for free/default access.
          example: '2026-03-31'
        auto_renew:
          type: boolean
          description: Whether the subscription should renew automatically.
          example: true
        created_at:
          type: string
          format: date-time
          description: When the user subscription record was created.
          example: '2026-03-01T09:30:00Z'
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
      required:
        - user_subscription_id
        - user_id
        - status
        - start_date
        - auto_renew
        - created_at
        - plan

    MySubscriptionResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MySubscription'
        message:
          type: string
          example: Current subscription fetched successfully.
      required:
        - data

    SubscriptionCheckoutRequest:
      type: object
      required:
        - subscription_plan_id
      properties:
        subscription_plan_id:
          type: integer
          description: ID of the paid subscription plan to purchase.
          example: 2
      additionalProperties: false

    SubscriptionCheckoutStatus:
      type: string
      description: Current state of the mocked checkout/payment flow.
      enum:
        - pending
        - paid
        - failed
      example: pending

    PaymentMethod:
      type: string
      description: Payment method used for subscription transactions.
      enum:
        - mock
      example: mock

    UserSubscriptionStatus:
      type: string
      description: Current lifecycle status of a user subscription.
      enum:
        - pending
        - active
        - canceled
        - expired
      example: active

    SubscriptionCheckoutData:
      type: object
      properties:
        transaction_id:
          type: integer
          description: Internal transaction ID created for this checkout.
          example: 27
        user_subscription_id:
          type: integer
          description: Internal user subscription record created or reserved for this checkout.
          example: 18
        checkout_status:
          $ref: '#/components/schemas/SubscriptionCheckoutStatus'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        payment_url:
          type: string
          format: uri
          description: Mock Stripe checkout URL.
          example: 'https://checkout.stripe.com/pay/mock-session-123'
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
      required:
