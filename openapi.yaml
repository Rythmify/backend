  /tracks/{track_id}/fan-leaderboard:
    get:
      description: |
        Returns up to 5 top fans for a track, ranked by play count for the selected period.
        `overall` uses all-time plays.
        `first_7_days` uses the fixed first 7 days starting from the track release window,
        anchored to `release_date` when present, otherwise `created_at`.
        `last_7_days` is still accepted temporarily as a deprecated backward-compatible alias.
      tags: [Tracks]
      summary: Get top fans for a track
      operationId: getTrackFanLeaderboard
      security: []
      parameters:
        - $ref: '#/components/parameters/TrackId'
        - name: period
          in: query
          required: false
          description: |
            `overall` ranks fans using all-time plays.
            `first_7_days` ranks fans using only plays with timestamps from the track release window:
            `played_at >= window_start` and `played_at < window_start + 7 days`,
            where `window_start` is `release_date` when present, otherwise `created_at`.
            `last_7_days` is still accepted temporarily as a deprecated alias, but responses always return `first_7_days`.
          schema:
            type: string
            enum: [overall, first_7_days]
            default: overall
        - name: secret_token
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fan leaderboard returned.
