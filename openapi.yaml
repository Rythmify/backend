  /me/player/queue/context:
    post:
      description: |
        High-level summary
        - Resolves a supported playback context into playable tracks and applies it to the
          authenticated user's saved player state.
        - The returned queue is normalized into queue items with provenance metadata so
          clients can render both playback ordering and source labels consistently.

        Interaction behavior
        - `interaction_type=play` starts the resolved context immediately, sets the
          current track to the first resolved track, preserves the current `next_up`
          bucket, and replaces the old `context` bucket.
        - `interaction_type=next_up` preserves the current track, appends the resolved
          items to the end of the `next_up` bucket, and keeps the existing `context`
          bucket behind them.
        - Duplicate tracks are allowed and each occurrence gets its own `queue_item_id`.

        Supported source types
        - `track`: queue one direct track into `next_up` by `source_id`. This source type
          only supports `interaction_type=next_up`.
        - `playlist`: resolve tracks from a playlist identified by `source_id`.
        - `album`: resolve tracks from an album identified by `source_id`.
        - `mix`: resolve tracks from a mix identified by `source_id`. Mix ids may be
          non-UUID strings such as `daily:for-you`.
        - `station`: resolve tracks from a station identified by `source_id`.
        - `genre`: resolve tracks from a genre identified by `source_id`.
        - `liked_tracks`: resolve a user's liked tracks. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.
        - `listening_history`: resolve the authenticated user's listening history.
          This source is self-only.
        - `reposts`: resolve a user's reposted tracks. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.
        - `user_tracks`: resolve tracks uploaded by a user. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.

        Parameter rules
        - `source_id` is required for `track`, `playlist`, `album`, `mix`, `station`,
          and `genre`.
        - `source_id` is usually omitted or `null` for `liked_tracks`,
          `listening_history`, `reposts`, and `user_tracks`.
        - For `source_type=track`, `source_id` must be the track UUID to queue.
        - Do not assume `source_id` is always a UUID. Mix contexts may use string keys.
        - `target_user_id` is optional for `liked_tracks`, `reposts`, and
          `user_tracks`, and defaults to the authenticated user when omitted.
        - `target_user_id` should be omitted or `null` for `track`, `playlist`, `album`,
          `mix`, `station`, and `genre`.
        - `listening_history` is self-only. Requesting another user's history through
          this endpoint is not allowed.
        - `source_type=track` does not support `interaction_type=play`.

        Response interpretation for FE
        - `source_type` describes where a returned queue item was resolved from.
        - `queue_bucket` describes where that queue item now lives in playback ordering:
          `next_up` or `context`.
        - These fields are not interchangeable. A `genre` or `playlist` resolved with
          `interaction_type=next_up` still keeps its real `source_type` while living in
          `queue_bucket=next_up`.
        - A direct single-track queue action keeps `source_type=track`. It is not
          converted into a context source type.
        - Use `source_type` together with `source_title` for provenance labels.
        - Use `queue_bucket` for ordering logic and visual grouping in the queue UI.
      tags: [Playback]
      summary: Apply a playback context to the player queue
      operationId: addQueueContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueContextRequest'
            examples:
              playPlaylist:
                summary: Play a playlist now
                value:
                  interaction_type: play
                  source_type: playlist
                  source_id: 4b28f3dd-2875-4811-aaf1-4fda7d3d113c
                  target_user_id: null
              playAlbum:
                summary: Play an album now
                value:
                  interaction_type: play
                  source_type: album
                  source_id: 1b9a4d54-76d3-40c6-b4d9-1dd0c518f3e2
                  target_user_id: null
              nextUpTrack:
                summary: Add one direct track to next up
                value:
                  interaction_type: next_up
                  source_type: track
                  source_id: 39c7c3c3-7d02-4ac1-a647-a2fa0401de02
                  target_user_id: null
              nextUpMix:
                summary: Add a mix to next up
                value:
                  interaction_type: next_up
                  source_type: mix
                  source_id: daily:for-you
                  target_user_id: null
              nextUpStation:
                summary: Add a station to next up
                value:
                  interaction_type: next_up
                  source_type: station
                  source_id: 61cb32ef-14d9-4ef6-8c54-0d8f0a6d0af5
                  target_user_id: null
              nextUpGenre:
