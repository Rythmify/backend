    # [FIX-9] genre_id is required (not nullable) in trending_by_genre
    HomeResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required:
            - hot_for_you
            - trending_by_genre
            - artists_to_watch
            - discover_with_stations
          properties:
            curated:
              nullable: true
              description: |
                Guest-only curated discovery section.
                Contains preview-only mix cards generated from multi-genre combinations.
                Not returned for authenticated users.
              allOf:
                - $ref: '#/components/schemas/CuratedHomeSection'
            hot_for_you:
              type: object
              required: [track, valid_until]
              properties:
                track:
                  $ref: '#/components/schemas/DiscoveryTrack'
                reason:
                  type: string
                  nullable: true
                  description: |
                    "Trending in {genre_name}" — unplayed track in user's top genre.
                    "global trending" — authenticated, no genre match.
                    null — unauthenticated user.
                valid_until:
                  type: string
                  format: date-time
            trending_by_genre:
              type: object
              required: [genres, initial_tab]
              properties:
                genres:
                  type: array
                  items:
                    type: object
                    required: [genre_id, genre_name, preview_track]
                    properties:
                      genre_id:
                        type: string
                        format: uuid
                      genre_name:
                        type: string
                      preview_track:
                        $ref: '#/components/schemas/DiscoveryTrack'
                initial_tab:
                  type: object
                  required: [genre_id, genre_name, tracks]
                  properties:
                    genre_id:
                      type: string
                      format: uuid
                    genre_name:
                      type: string
                    tracks:
                      type: array
                      items:
                        $ref: '#/components/schemas/DiscoveryTrack'
            more_of_what_you_like:
              nullable: true
              description: |
                null for unauthenticated users.
                Present only for authenticated users.
              allOf:
                - type: object
                  required: [tracks, source]
                  properties:
                    tracks:
                      type: array
                      items:
                        $ref: '#/components/schemas/DiscoveryTrack'
                    source:
                      type: string
                      enum: [personalized, trending_fallback]
            albums_for_you:
              nullable: true
              description: |
                null for unauthenticated users.
                Present only for authenticated users.
              allOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/DiscoveryAlbum'
            mixed_for_you:
              nullable: true
              description: |
                null for unauthenticated users.
                Present only for authenticated users.
              allOf:
                - type: array
                  maxItems: 6
                  items:
                    $ref: '#/components/schemas/HomeMixPreview'
            # [FIX-5] made_for_you is nullable — null for unauthenticated users
            made_for_you:
              nullable: true
              description: |
                null for unauthenticated users (requires auth to generate).
                When null, the FE should hide the Made For You section.
                When source = "trending_fallback", display generic labels.
              allOf:
                - type: object
                  required: [daily_mix, weekly_mix]
                  properties:
                    daily_mix:
                      $ref: '#/components/schemas/CuratedMixSummary'
                    weekly_mix:
                      $ref: '#/components/schemas/CuratedMixSummary'
            artists_to_watch:
              type: array
              maxItems: 10
              items:
                $ref: '#/components/schemas/EmergingArtist'
            discover_with_stations:
              type: array
              maxItems: 10
              example:
                - id: d3d8c9a0-8c6f-4a98-a5a4-b5c2d70bc1f1
                  artist_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  artist_name: DJ Karim
                  images:
                    left: https://cdn.rythmify.com/covers/track1.jpg
                    center: https://cdn.rythmify.com/covers/artist.jpg
                    right: https://cdn.rythmify.com/covers/track2.jpg
                  preview_track:
                    id: e5f6a7b8-c9d0-1234-efab-567890abcdef
                    title: Midnight Run
                    cover_image: https://cdn.rythmify.com/covers/track1.jpg
                    duration: 213
                    genre_name: Electronic
                    play_count: 18
                    like_count: 8
                    repost_count: 3
                    user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    artist_name: DJ Karim
                    stream_url: https://cdn.rythmify.com/tracks/e5f6a7b8/stream.mp3
                    created_at: '2026-03-01T10:00:00Z'
                  track_count: 4
              items:
                $ref: '#/components/schemas/DiscoveryStation'
        message:
          type: string
          example: Home page data fetched successfully.

