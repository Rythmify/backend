    Comment:
      type: object
      description: |
        A timestamped comment on a track. Supports nested replies.

        Performance notes:
        - `reply_count` must be denormalized (stored column, not COUNT subquery) to avoid O(n) lookups during pagination.
          Backend: Add column `reply_count INTEGER DEFAULT 0`, increment on POST reply, decrement on DELETE reply.
          Protected against race conditions: uses pg_advisory_xact_lock() for concurrent inserts.

        - `updated_at` column tracks edit timestamps. Must be updated on every PATCH operation.

        - Sorting is always DETERMINISTIC via tie-breaking:
          ORDER BY [primary_sort_column], created_at ASC, id ASC
          This ensures identical results across queries (no comment jumping during pagination).

        - Database index REQUIRED for waveform queries: CREATE INDEX ON "comments" ("track_id", "track_timestamp", "created_at", "id")
          This covers: timestamp filtering, full sorting, zero in-memory sort operations.
      properties:
        comment_id:
          type: string
          format: uuid
        track_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        parent_comment_id:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
          minLength: 1
          maxLength: 500
        track_timestamp:
          type: integer
          minimum: 0
          description: Position in the track (in seconds) where this comment was posted.
        like_count:
          type: integer
        reply_count:
          type: integer
          description: Total nested replies (must be denormalized, not computed at query time).
        is_liked_by_me:
          type: boolean
        author:
          $ref: '#/components/schemas/UserSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Set when comment is edited. Null if never edited.

    CommentListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        pagination:
          $ref: '#/components/schemas/ListMeta'

