  # Module 8 — Feed, Search & Discovery
  # [FIX-1] Replaced single /feed with /feed (Following tab) + /feed/discover
  # [FIX-3] FeedItem schema replaces FeedTrack in feed responses
  # [FIX-6] Pagination changed to ListMeta (offset-based)
  # ==========================================================

  /feed:
    get:
      tags: [Feed]
      summary: Following tab — chronological feed from followed accounts
      description: |
        Returns a chronological stream of tracks and reposts from users
        the authenticated user follows. Each item is typed as either
        `track` (original upload) or `repost` (a repost by a followed user).

        When `item_type = "repost"`, the `repost_by` field contains the
        user who reposted it. The track data is always the original track.

        Only public, non-hidden, ready tracks are included.
        Admin-hidden tracks are excluded.
      operationId: getFollowingFeed
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Following feed returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  # [FIX-1] Added — Discover/Recommended tab
  /feed/discover:
    get:
      tags: [Feed]
      summary: Discover tab — recommended and trending content stream
      description: |
        Returns a stream of recommended tracks based on the user's listening
        history, followed artists, and genre preferences. For unauthenticated
        users, returns globally trending content.

        Unlike `GET /home` which returns structured sections, this endpoint
        returns a flat, paginated, mixed stream suitable for infinite scroll.

        Only public, non-hidden, ready tracks are included.
      operationId: getDiscoverFeed
      security: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Discover feed returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /feed/trending:
    get:
      tags: [Feed]
      summary: Get trending tracks
      description: |
        Returns tracks ranked by recent play count and engagement velocity.
        Each result includes `rank` and `trend_score`.
      operationId: getTrendingFeed
      security: []
      parameters:
        - name: genre
          in: query
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [day, week, month], default: week }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Trending tracks returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendingFeedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  # [FIX-6][FIX-7] Search: pagination inside data, per-type meta
  /search:
    get:
      tags: [Search]
      summary: Global search
      description: |
        Search across tracks, users, and playlists using keyword matching.
        All result items include a relevance `score` field (0–1).

        Pagination is per resource type via `limit` and `offset`.
        Use `type` to restrict results to a single resource and paginate independently.
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
        - name: type
          in: query
          schema: { type: string, enum: [tracks, users, playlists] }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, newest, plays], default: relevance }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Search results returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /resolve:
    get:
      description: Resolves a Rythmify permalink URL to its resource type and ID.
      tags: [Search]
      summary: Resolve permalink to resource
      operationId: resolvePermalink
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string, format: uri }
      responses:
        '200':
          description: Permalink resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveResponse'
        '400':
          description: Invalid URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================
  # Module 9 — Messaging & Track Sharing
  # ==========================================================

  /messages/conversations:
    get:
      description: |
        Returns conversations for the authenticated user, sorted by most recent message.
        Uses offset-based pagination (`limit`, `offset`).
        Legacy `page` is accepted as a backward-compatible fallback.
      tags: [Messages]
      summary: List all conversations
      operationId: listConversations
      parameters:
        - name: page
          in: query
          deprecated: true
          description: Legacy page number. Use `offset` instead.
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Paginated list of conversations returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/conversations/{conversationId}:
    get:
      description: |
        Returns a conversation and its message thread, paginated oldest-to-newest.
        Uses offset-based pagination (`limit`, `offset`).
        Legacy `page` is accepted as a fallback when `offset` is omitted.
      tags: [Messages]
      summary: Get a single conversation with messages
      operationId: getConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Conversation and messages returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      description: Soft-deletes the conversation for the authenticated user only.
      tags: [Messages]
      summary: Delete a conversation
      operationId: deleteConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Conversation deleted for current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/conversations/{conversationId}/messages:
    post:
      description: Appends a new text or embedded resource message to an existing conversation.
      tags: [Messages]
      summary: Send a message in a conversation
      operationId: sendMessage
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageCreatedResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Sender blocked or messaging restricted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                blocked:
                  value:
                    error:
                      code: MESSAGES_BLOCKED
                      message: You cannot send a message to this user.
                disabled:
                  value:
                    error:
                      code: MESSAGES_DISABLED
                      message: This user does not accept messages from anyone.
                followersOnly:
                  value:
                    error:
                      code: MESSAGES_FOLLOWERS_ONLY
                      message: This user only accepts messages from people they follow.
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/conversations/{conversationId}/messages/{messageId}:
    delete:
      description: Permanently deletes a message the authenticated user sent.
      tags: [Messages]
      summary: Delete a specific message
      operationId: deleteMessage
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: messageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Message deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/new:
    post:
      description: Creates a new direct message conversation and sends the first message.
      tags: [Messages]
      summary: Start a new conversation
      operationId: startConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartConversationRequest'
      responses:
        '201':
          description: Conversation created and first message sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationCreatedResponse'
        '200':
          description: Existing conversation found — message appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageCreatedResponse'
        '400':
          description: Validation failed or self-messaging.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Recipient has blocked sender or does not accept messages under current privacy settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                blocked:
                  value:
                    error:
                      code: MESSAGES_BLOCKED
                      message: You cannot send a message to this user.
                disabled:
                  value:
                    error:
                      code: MESSAGES_DISABLED
                      message: This user does not accept messages from anyone.
                followersOnly:
                  value:
                    error:
                      code: MESSAGES_FOLLOWERS_ONLY
                      message: This user only accepts messages from people they follow.
        '404':
          description: Recipient not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/conversations/ensure:
    post:
      description: Returns an existing conversation or creates one if none exists, without sending a message.
      tags: [Messages]
      summary: Ensure a conversation exists
      operationId: ensureConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnsureConversationRequest'
      responses:
        '201':
          description: Conversation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnsureConversationResponse'
        '200':
          description: Existing conversation returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnsureConversationResponse'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Recipient policy blocks this sender.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recipient not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/unread-count:
    get:
      description: Returns the total unread message count across all conversations.
      tags: [Messages]
      summary: Get total unread message count
      operationId: getUnreadMessageCount
      responses:
        '200':
          description: Unread message count returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /messages/conversations/{conversationId}/messages/{messageId}/read:
    patch:
      description: Sets the read or unread state of a single message.
      tags: [Messages]
      summary: Mark a message as read or unread
      operationId: markMessageReadState
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: messageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkMessageReadRequest'
      responses:
        '200':
          description: Message read state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkMessageReadResponse'
        '400':
          description: Missing or invalid is_read value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Message already in requested read state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================================
  # Module 10 — Real-Time Notifications
  # [FIX-11] Corrected section label (was "Messaging & Track Sharing")
  # ==========================================================

  /notifications:
    get:
      description: Returns the authenticated user's paginated in-app notification feed.
      tags: [Notifications]
      summary: Get in-app notification feed
      operationId: getNotifications
      parameters:
        - name: page
          in: query
          description: 1-based page index.
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - name: unread_only
          in: query
          description: |
            Read-state filter.
            - true: unread notifications only
            - false: read notifications only
            - omitted: all notifications
            Also accepts aliases `unread` and `unreadOnly`.
          schema: { type: boolean }
        - name: type
          in: query
          description: Filter by notification type.
          schema:
            type: string
            enum: [follow, like, repost, comment, new_post_by_followed]
      responses:
        '200':
          description: Notification feed returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/unread-count:
    get:
      description: Returns the total count of unread notifications for the authenticated user.
      tags: [Notifications]
      summary: Get unread notification count
      operationId: getUnreadNotificationCount
      responses:
        '200':
          description: Unread notification count returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/read-all:
    post:
      description: Marks all unread notifications as read and resets the unread counter.
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      responses:
        '200':
          description: All notifications marked as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/{notification_id}/read:
    patch:
      description: Marks a single notification as read.
      tags: [Notifications]
      summary: Mark a single notification as read
      operationId: markNotificationRead
      parameters:
        - name: notification_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notification marked as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/{notification_id}:
    delete:
      description: Permanently removes a single notification from the user's feed.
      tags: [Notifications]
      summary: Delete a notification
      operationId: deleteNotification
      parameters:
        - name: notification_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Notification deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/push/register:
    post:
      description: Registers a device push token for FCM or APNs delivery.
      tags: [Notifications]
      summary: Register a device push token
      operationId: registerPushToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPushTokenRequest'
      responses:
        '200':
          description: Push token registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Missing or malformed token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/push/unregister:
    post:
      description: Removes a device push token to stop push notifications on that device.
      tags: [Notifications]
      summary: Unregister a device push token
      operationId: unregisterPushToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnregisterPushTokenRequest'
      responses:
        '200':
          description: Push token removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Missing token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Token not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/preferences:
    get:
      description: Returns the authenticated user's full notification preference flags.
      tags: [Notifications]
      summary: Get notification preferences
      operationId: getNotificationPreferences
      responses:
        '200':
          description: Notification preferences returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      description: Partially updates the authenticated user's notification preference flags.
      tags: [Notifications]
      summary: Update notification preferences
      operationId: updateNotificationPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationPreferencesRequest'
      responses:
        '200':
          description: Preferences updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
        '400':
          description: Invalid preference field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==========================================================
  # Module 11 — Moderation & Admin Dashboard
  # ==========================================================

  /reports:
    post:
      tags: [Moderation]
      summary: Submit a content report
      description: |
        Report a track or user. Rate limit: 10 reports per hour per user.
        `copyright` reason is only valid for tracks, not users.
      operationId: submitReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '201':
          description: Report submitted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Report'
                  message:
                    type: string
                    example: Report submitted successfully.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Reported resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already reported this resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /admin/reports:
    get:
      description: Returns all submitted content reports for admin review, with optional filters.
      tags: [Admin]
      summary: List all reports (admin only)
      operationId: listAdminReports
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, resolved, dismissed] }
        - name: reason
          in: query
          schema: { type: string, enum: [copyright, inappropriate, spam, impersonation] }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Reports returned.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReportDetailed'
                  pagination:
                    $ref: '#/components/schemas/ListMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/reports/{id}:
    get:
      description: Returns the full details of a single content report by ID.
      tags: [Admin]
      summary: Get a single report (admin only)
      operationId: getAdminReport
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Report returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ReportDetailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      description: Updates a report's status to resolved or dismissed with an optional admin note.
      tags: [Admin]
      summary: Resolve or dismiss a report (admin only)
      operationId: resolveAdminReport
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [resolved, dismissed]
                admin_note:
                  type: string
      responses:
        '200':
          description: Report updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [resolved, dismissed]
                      resolved_at:
                        type: string
                        format: date-time
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/tracks/{id}:
    delete:
      description: Permanently deletes a track and all its data from the platform.
      tags: [Admin]
      summary: Delete a track (admin only)
      operationId: adminDeleteTrack
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Track deleted. No response body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      description: Sets the is_hidden flag on a track to suppress it from public view.
      tags: [Admin]
      summary: Hide/unhide a track (admin only)
      operationId: adminToggleTrackVisibility
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_hidden]
              properties:
                is_hidden:
                  type: boolean
                reason:
                  type: string
      responses:
        '200':
          description: Track visibility updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      track_id:
                        type: string
                        format: uuid
                      is_hidden:
                        type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users/{id}/suspend:
    patch:
      description: Suspends a user account, blocking login and all platform activity.
      tags: [Admin]
      summary: Suspend a user account (admin only)
      operationId: adminSuspendUser
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  example: Repeated copyright violations
      responses:
        '200':
          description: Account suspended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        example: suspended
                      reason:
                        type: string
                      suspended_at:
                        type: string
                        format: date-time
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot suspend admin account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{id}/reinstate:
    patch:
      description: Restores access to a previously suspended user account.
      tags: [Admin]
      summary: Reinstate a suspended account (admin only)
      operationId: adminReinstateUser
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Account reinstated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        example: active
                      reinstated_at:
                        type: string
                        format: date-time
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/analytics:
    get:
      description: Returns high-level platform metrics for the specified reporting period.
      tags: [Admin]
      summary: Get platform analytics (admin only)
      operationId: getAdminAnalytics
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [day, week, month], default: month }
      responses:
        '200':
          description: Analytics returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AnalyticsSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================================
  # Module 12 — Premium Subscription & Payments
  # ==========================================================

  /subscriptions/plans:
    get:
      description: Returns all available subscription plan options and their limits.
      tags: [Subscription]
      summary: List available subscription plans
      operationId: listSubscriptionPlans
      security: []
      responses:
        '200':
          description: Subscription plans returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanListResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /subscriptions/me:
    get:
      description: Returns the authenticated user's current subscription and plan details.
      tags: [Subscription]
      summary: Get current user subscription
      operationId: getMySubscription
      responses:
        '200':
          description: Current subscription returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MySubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /subscriptions/checkout:
    post:
      description: Creates a mocked Stripe checkout session for a paid subscription plan.
      tags: [Subscription]
      summary: Start subscription checkout
      operationId: createSubscriptionCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCheckoutRequest'
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Already has active subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Plan not eligible for checkout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /subscriptions/cancel:
    post:
      description: Disables auto-renew on the authenticated user's active premium subscription.
      tags: [Subscription]
      summary: Cancel current subscription
      operationId: cancelMySubscription
      responses:
        '200':
          description: Subscription canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelSubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active subscription found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /subscriptions/transactions:
    get:
      description: Returns the authenticated user's subscription payment transaction history.
      tags: [Subscription]
      summary: List subscription transactions
      operationId: listMySubscriptionTransactions
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: payment_status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentStatus'
      responses:
        '200':
          description: Transactions returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionTransactionListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /subscriptions/mock-confirm/{transaction_id}:
    post:
      description: Simulates Stripe payment confirmation and activates the linked subscription.
      tags: [Subscription]
      summary: Confirm mocked subscription payment
      operationId: confirmMockSubscriptionPayment
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Mock payment confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockConfirmSubscriptionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already paid or not pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ==========================================================
  # Module 3 — Followers & Social Graph
  # ==========================================================

  /users/{user_id}/follow:
    post:
      description: Creates a follow relationship from the authenticated user to the target user.
      tags: [Follow]
      summary: Follow a user
      operationId: followUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Already following — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Followed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowResponse'
        '400':
          description: Cannot follow yourself.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Block relationship exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the follow relationship from the authenticated user to the target user.
      tags: [Follow]
      summary: Unfollow a user
      operationId: unfollowUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Unfollowed — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/followers:
    get:
      description: Returns a paginated list of users who follow the specified user.
      tags: [Follow]
      summary: List a user's followers
      operationId: getFollowers
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated followers list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/following:
    get:
      description: Returns a paginated list of users the specified user follows.
      tags: [Follow]
      summary: List users that a user follows
      operationId: getFollowing
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated following list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{user_id}/follow-status:
    get:
      description: Returns the follow and block relationship between the caller and the target user.
      tags: [Follow]
      summary: Check relationship status between me and a user
      operationId: getFollowStatus
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Relationship status returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FollowStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/suggested:
    get:
      description: Returns suggested users to follow from mutual connections and popular accounts. Response uses ListMeta pagination in the `pagination` object.
      tags: [Follow Discovery]
      summary: Get suggested users to follow
      operationId: getSuggestedUsers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Suggested users returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestedUsersResponse'
              example:
                data:
                  - id: 11111111-1111-1111-1111-111111111111
                    display_name: Alice Wave
                    username: alicewave
                    profile_picture: https://cdn.rythmify.com/avatars/alice.jpg
                    is_verified: true
                    follower_count: 1240
                    mutual_count: 4
                    suggestion_source: mutual
                    is_following: false
                pagination:
                  limit: 20
                  offset: 0
                  total: 340
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /users/suggested/artists:
    get:
      description: Returns suggested artists to follow based on the user's liked-track genre history. Response uses ListMeta pagination in the `pagination` object.
      tags: [Follow Discovery]
      summary: Get suggested artists to follow
      operationId: getSuggestedArtists
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Suggested artists returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestedArtistsResponse'
              example:
                data:
                  - id: 22222222-2222-2222-2222-222222222222
                    display_name: Echo Atlas
                    username: echoatlas
                    profile_picture: https://cdn.rythmify.com/avatars/echo.jpg
                    is_verified: false
                    follower_count: 870
                    top_genre: electronic
                    is_following: false
                pagination:
                  limit: 20
                  offset: 0
                  total: 210
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /users/{user_id}/block:
    post:
      description: Blocks the target user, removing any existing follow relationships.
      tags: [Block]
      summary: Block a user
      operationId: blockUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Already blocked — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: User blocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResponse'
        '400':
          description: Cannot block yourself.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the block on the target user.
      tags: [Block]
      summary: Unblock a user
      operationId: unblockUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Unblocked — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/blocked:
    get:
      description: Returns a paginated list of all users blocked by the authenticated user.
      tags: [Block]
      summary: List users I have blocked
      operationId: getBlockedUsers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated blocked users list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/follow-requests:
    get:
      description: Returns a paginated list of pending follow requests to the authenticated user (on private accounts).
      tags: [Follow]
      summary: List pending follow requests
      operationId: getPendingFollowRequests
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated pending follow requests list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/follow-requests/{request_id}/accept:
    post:
      description: Accepts a pending follow request and creates a follow relationship.
      tags: [Follow]
      summary: Accept a follow request
      operationId: acceptFollowRequest
      parameters:
        - name: request_id
          in: path
          required: true
          description: The follow request UUID
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Follow request already accepted — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Follow request accepted. User is now following.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Follow request not found or already processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/follow-requests/{request_id}/reject:
    post:
      description: Rejects a pending follow request without creating a follow relationship.
      tags: [Follow]
      summary: Reject a follow request
      operationId: rejectFollowRequest
      parameters:
        - name: request_id
          in: path
          required: true
          description: The follow request UUID
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Follow request rejected — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Follow request not found or already processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/follow-requests/{request_id}:
    delete:
      description: Cancels a follow request sent by the authenticated user.
      tags: [Follow]
      summary: Cancel a follow request
      operationId: cancelFollowRequest
      parameters:
        - name: request_id
          in: path
          required: true
          description: The follow request UUID
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Follow request canceled — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Follow request not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/following:
    get:
      tags: [Follow]
      summary: Get or search my following list
      description: |
        Returns users the authenticated user follows.
        With `q`, filters by display_name or username (debounce at 300ms client-side).
        Used for new conversation user picker.
      operationId: getMyFollowing
      parameters:
        - name: q
          in: query
          schema: { type: string, minLength: 1, maxLength: 100 }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Following list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowingSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==========================================================
  # Module 6 — Engagement & Social Interactions
  # ==========================================================

  /tracks/{track_id}/like:
    post:
      description: Records a like on the specified track for the authenticated user.
      tags: [Likes]
      summary: Like a track
      operationId: likeTrack
      parameters:
        - $ref: '#/components/parameters/TrackId'
      responses:
        '200':
          description: Already liked — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Track liked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the authenticated user's like from the specified track.
      tags: [Likes]
      summary: Unlike a track
      operationId: unlikeTrack
      parameters:
        - $ref: '#/components/parameters/TrackId'
      responses:
        '204':
          description: Unliked — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tracks/{track_id}/likers:
    get:
      description: Returns a paginated list of users who liked the specified track.
      tags: [Likes]
      summary: List users who liked a track
      operationId: getTrackLikers
      parameters:
        - $ref: '#/components/parameters/TrackId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated likers list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tracks/{track_id}/repost:
    post:
      description: Reposts the specified track to the authenticated user's profile.
      tags: [Reposts]
      summary: Repost a track
      operationId: repostTrack
      parameters:
        - $ref: '#/components/parameters/TrackId'
      responses:
        '200':
          description: Already reposted — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Track reposted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepostResponse'
        '400':
          description: Cannot repost own track.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the authenticated user's repost of the specified track.
      tags: [Reposts]
      summary: Remove a repost
      operationId: removeRepost
      parameters:
        - $ref: '#/components/parameters/TrackId'
