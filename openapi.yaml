# ============================================================
# Rythmify API — OpenAPI 3.0.3 Specification
# Version: 2.0 (Fixed — April 2026)
# ============================================================

openapi: '3.0.3'

info:
  title: Rythmify API
  description: API for the Rythmify music platform
  version: '2.0'

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.rythmify.com/api/v1
    description: Production server

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Registration, login, token refresh, and logout
  - name: Users
    description: User profiles, avatars, and account settings
  - name: Tracks
    description: Audio upload, metadata, and track management
  - name: Playback
    description: Playback, player state, queue, and listening-history endpoints.
  - name: Playlists
    description: Create and manage playlists and track ordering
  - name: Comments
    description: Track comments, replies, and comment management
  - name: Feed
    description: Activity feed — Following tab and Discover tab
  - name: Home & Discovery
    description: Personalized home page, stations, mixes, and trending content
  - name: Genre Discovery
    description: Genre page aggregator and paginated sub-endpoints
  - name: Track Discovery
    description: Track-level discovery — related tracks and contextual navigation
  - name: Follow Discovery
    description: Suggested users and artists to follow
  - name: Messages
    description: Direct messaging between users
  - name: Notifications
    description: Real-time alerts for social interactions
  - name: Search
    description: Global search across tracks, users, and playlists
  - name: Follow
    description: Follow, unfollow, followers, following, and suggested users
  - name: Block
    description: Block and unblock users
  - name: Likes
    description: Like and unlike tracks, playlists, and albums. List who liked items and view personal liked libraries.
  - name: Reposts
    description: Repost and remove reposts from tracks, playlists, and albums. List who reposted items and view personal reposted libraries.
  - name: Subscription
    description: Subscription plans, mocked Stripe payments, and premium feature gating
  - name: Moderation
    description: User-facing content reporting for copyright and inappropriate content flags
  - name: Admin
    description: Admin-only endpoints for moderation actions, account management, and platform analytics (requires Admin role)

# ============================================================
# PATHS
# ============================================================
paths:
  # ==========================================================
  # Module 1 — Authentication & User Management
  # ==========================================================

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      description: |
        Creates a new user account.
        - CAPTCHA is required to mitigate bot activity.
        - The account role defaults to `listener`.
        - Sends a verification email with a token.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Account created and verification email sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_EMAIL_ALREADY_EXISTS
                  message: Email already registered.
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/verify-email:
    post:
      description: Confirms a user's email address using the token sent at registration.
      tags: [Auth]
      summary: Verify email address with token
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyEmailRequest'
      responses:
        '200':
          description: Email verified. Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyEmailResponse'
        '400':
          description: Invalid or expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_TOKEN_INVALID
                  message: Invalid or expired verification token
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/resend-verification:
    post:
      description: Sends a new email verification token to an unverified account.
      tags: [Auth]
      summary: Resend email verification link
      operationId: resendVerificationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResendVerificationRequest'
      responses:
        '200':
          description: Verification email resent (or no-op if not applicable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email or username
      description: |
        Authenticates a user and issues tokens.
        Returns `access_token` in response body.
        Sets `refresh_token` as HttpOnly cookie.
        Login identifier can be email or username.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Logged in successfully.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_INVALID_CREDENTIALS
                  message: Email/username or password incorrect
        '422':
          description: Email not verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_EMAIL_NOT_VERIFIED
                  message: Email must be verified before login
        '403':
          description: Account suspended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_ACCOUNT_SUSPENDED
                  message: Account suspended by admin
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      description: Issues a new access token using the HttpOnly refresh token cookie.
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshAccessToken
      security: []
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '401':
          description: Invalid/expired refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_REFRESH_TOKEN_INVALID
                  message: Refresh token is missing, invalid, or expired
        '403':
          description: Account suspended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      description: Clears the refresh token cookie, ending the current session.
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      operationId: logoutUser
      security: []
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/forgot-password:
    post:
      description: Sends a password reset link to the provided email address.
      tags: [Auth]
      summary: Request password reset email
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email request processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      description: Applies a new password using a valid password reset token.
      tags: [Auth]
      summary: Reset password using reset token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '422':
          description: Token invalid/expired/used/revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_TOKEN_EXPIRED
                  message: Password reset token expired
        '429':
          $ref: '#/components/responses/RateLimited'

  # [FIX-13] Added — was referenced in disconnect endpoint but missing from spec
  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password for authenticated user
      description: |
        Changes the password for the authenticated user.
        Required before disconnecting an OAuth provider if it is the only login method.
        On success, all active sessions are invalidated (equivalent to logout_all=true).
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                data:
                  success: true
                message: Password changed successfully. Please log in again.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Current password is incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: AUTH_INVALID_CREDENTIALS
                  message: Current password is incorrect
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/change-email:
    post:
      description: Initiates an email change by sending a verification link to the new address.
      tags: [Auth]
      summary: Request email change
      operationId: requestEmailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChangeEmailRequest'
      responses:
        '200':
          description: Verification email sent to new address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/verify-email-change:
    post:
      description: Applies a pending email change using the token sent to the new address.
      tags: [Auth]
      summary: Confirm email change using token
      operationId: verifyEmailChange
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyEmailChangeRequest'
      responses:
        '200':
          description: Email updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyEmailChangeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Token invalid/expired/used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/google:
    post:
      description: Authenticates or registers a user via a Google ID token.
      tags: [Auth]
      summary: Login / register with Google
      operationId: googleLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthGoogleLoginRequest'
      responses:
        '200':
          description: Logged in successfully with Google.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthGoogleLoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Google token invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account suspended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/oauth/soundcloud:
    get:
      description: Redirects the browser to the SoundCloud OAuth consent screen.
      tags: [Auth]
      summary: Start SoundCloud OAuth authorization
      operationId: startSoundCloudOAuth
      security: []
      parameters:
        - name: return_to
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to SoundCloud consent screen.

  /auth/oauth/soundcloud/callback:
    get:
      description: Handles the SoundCloud OAuth redirect and issues Rythmify tokens.
      tags: [Auth]
      summary: SoundCloud OAuth callback
      operationId: soundCloudOAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OAuth completed. Tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          description: Invalid callback parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: OAuth exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/connections/{provider}:
    delete:
      tags: [Auth]
      summary: Disconnect a linked OAuth provider
      description: |
        Unlinks a connected OAuth provider. Returns 422 if this is the only
        login method and no password is set. Set a password first via
        `POST /auth/change-password` before disconnecting.
      operationId: disconnectOAuthProvider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, facebook, apple]
      responses:
        '200':
          description: Provider disconnected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No connection found for this provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Cannot disconnect — only login method and no password set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: Cannot disconnect the only login method. Set a password first.
        '500':
          $ref: '#/components/responses/InternalError'

  # ==========================================================
  # Module 2 — User Profile & Social Identity
  # ==========================================================

  /users/{user_id}:
    get:
      description: Returns the public profile for a given user, respecting privacy settings.
      tags: [Users]
      summary: Get a user profile by ID
      operationId: getUserById
      security: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User profile returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserResponse'
        '403':
          description: Profile is private.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me:
    get:
      description: Returns the full authenticated user profile including private fields.
      tags: [Users]
      summary: Get own profile (authenticated)
      operationId: getMyProfile
      responses:
        '200':
          description: Own profile returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnProfileFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      description: Partially updates the authenticated user's public profile fields.
      tags: [Users]
      summary: Edit own profile
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnProfileFullResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Username already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/account:
    patch:
      description: Updates birth date and gender for the authenticated user's account.
      tags: [Users]
      summary: Update account settings (birth date, gender)
      operationId: updateMyAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnProfileFullResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/role:
    patch:
      description: Switches the authenticated user's role between artist and listener.
      tags: [Users]
      summary: Switch account role (Artist ↔ Listener)
      operationId: switchUserRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchRoleRequest'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: User already has the requested role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/avatar:
    post:
      description: Uploads and stores a new profile picture, replacing any existing one.
      tags: [Users]
      summary: Upload or replace profile picture
      operationId: uploadAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
      responses:
        '200':
          description: Avatar uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/FileTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      description: Removes the current profile picture and resets the field to null.
      tags: [Users]
      summary: Remove profile picture
      operationId: deleteAvatar
      responses:
        '200':
          description: Profile picture removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/cover:
    post:
      description: Uploads and stores a new cover photo, replacing any existing one.
      tags: [Users]
      summary: Upload or replace cover photo
      operationId: uploadCover
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CoverUploadRequest'
      responses:
        '200':
          description: Cover photo uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverUploadResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/FileTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      description: Removes the current cover photo and resets the field to null.
      tags: [Users]
      summary: Remove cover photo
      operationId: deleteCover
      responses:
        '200':
          description: Cover photo removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/web-profiles:
    get:
      description: Returns all external social links saved by the authenticated user.
      tags: [Users]
      summary: List linked social / web profiles
      operationId: listWebProfiles
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Web profile list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebProfileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      description: Adds a new external social or website link to the user's profile.
      tags: [Users]
      summary: Add a social / web profile link
      operationId: addWebProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWebProfileRequest'
      responses:
        '201':
          description: Web profile link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebProfileCreatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A profile for this platform already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/web-profiles/{profile_id}:
    delete:
      description: Removes a specific external social link by its ID.
      tags: [Users]
      summary: Remove a linked social / web profile
      operationId: deleteWebProfile
      parameters:
        - name: profile_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Web profile removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/privacy:
    patch:
      description: Sets the is_private flag on the authenticated user's profile.
      tags: [Users]
      summary: Toggle profile public / private visibility
      operationId: updatePrivacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrivacyRequest'
      responses:
        '200':
          description: Privacy setting updated.
          content:
            application/json:
              schema:
