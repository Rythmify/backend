# ============================================================
# Rythmify API — OpenAPI 3.0.3 Specification
# This is the main API spec file used by the entire team.
# All endpoints, schemas, and security definitions live here.
#
# HOW TO CONTRIBUTE:
#   1. Add your endpoints under `paths:` grouped by tag.
#   2. Define reusable models (User, Track, etc.) under `components.schemas`.
#   3. Reference shared schemas with $ref: '#/components/schemas/SchemaName'
#   4. Use the tags below to keep endpoints organized by module.
# ============================================================

openapi: 3.0.3

# ------------------------------------------------------------
# API Metadata
# ------------------------------------------------------------
info:
  title: Rythmify API
  description: API for the Rythmify music platform
  version: 1.0.0

# ------------------------------------------------------------
# Servers
# Add or adjust environments as needed (staging, preview, etc.)
# ------------------------------------------------------------
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: https://api.rythmify.com/api/v1
    description: Production server

# ------------------------------------------------------------
# Global Security
# All endpoints require JWT bearer auth by default.
# To mark an endpoint as public, override with: security: []
# ------------------------------------------------------------
security:
  - bearerAuth: []

# ------------------------------------------------------------
# Tags — Module groupings for organizing endpoints.
# Every endpoint must include a `tags:` field matching one below.
# ------------------------------------------------------------
tags:
  - name: Auth
    description: Registration, login, token refresh, and logout
  - name: Users
    description: User profiles, avatars, and account settings
  - name: Tracks
    description: Audio upload, metadata, and track management
  - name: Playlists
    description: Create and manage playlists and track ordering
  - name: Comments
    description: Track comments, replies, and comment management
  - name: Feed
    description: Activity feed from followed artists
  - name: Messages
    description: Direct messaging between users
  - name: Notifications
    description: Real-time alerts for social interactions
  - name: Search
    description: Global search across tracks, users, and playlists
  - name: Upload
    description: File upload handling for audio and images
  - name: Follow
    description: Follow, unfollow, followers, following, and suggested users
  - name: Block
    description: Block and unblock users
  - name: Likes
    description: Like and unlike tracks, playlists, and comments
  - name: Reposts
    description: Repost and remove reposts from tracks and playlists
  - name: Subscription
    description: Subscription plans, mocked Stripe payments, and premium feature gating
  - name: Moderation
    description: User-facing content reporting for copyright and inappropriate content flags
  - name: Admin
    description: Admin-only endpoints for moderation actions, account management, and platform analytics (requires Admin role)

# ------------------------------------------------------------
# Paths — Add all API endpoints here.
#
# Follow this structure for each endpoint:
#
# /resource:
#   post:
#     tags: [TagName]
#     summary: Short action description
#     requestBody:
#       required: true
#       content:
#         application/json:
#           schema:
#             $ref: '#/components/schemas/YourSchema'
#     responses:
#       '201':
#         description: Resource created
#         content:
#           application/json:
#             schema:
#               $ref: '#/components/schemas/YourSchema'
#       '400':
#         $ref: '#/components/responses/ValidationError'
#       '401':
#         $ref: '#/components/responses/Unauthorized'
# ------------------------------------------------------------
paths:
  # ==========================================================
  # Module 1 — Authentication & User Management
  # ==========================================================

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      description: |
        Creates a new user account.
        - CAPTCHA is required to mitigate bot activity.
        - The account role is assigned by default to `listener`.  
        - Sends a verification email with a token.
      operationId: registerUser
      security: [] # public endpoint (overrides global bearerAuth)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"

      responses:
        "201":
          description: Account created and verification email sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRegisterResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_EMAIL_ALREADY_EXISTS
                  message: Email already registered.

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address with token
      description: |
        Verifies the user's email using the verification token sent by email.
        On success:
        - marks the user as verified
        - returns an access token (JWT)
        - refresh token is set as an HttpOnly cookie
      operationId: verifyEmail
      security: [] # public endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyEmailRequest"

      responses:
        "200":
          description: Email verified successfully (or already verified). Token(s) issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyEmailResponse"

        "400":
          description: Invalid or expired verification token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_TOKEN_INVALID
                  message: Invalid or expired verification token

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification link
      description: |
        Resends the verification email for an unverified account.

        **Security note:** To avoid email enumeration, this endpoint returns 200 even if
        the email does not exist. If the account exists and is not verified, a new token is sent.
      operationId: resendVerificationEmail
      security: [] # public endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResendVerificationRequest"

      responses:
        "200":
          description: Verification email resent (or no-op if not applicable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: If the email exists and is not verified, a verification link has been sent.

        "400":
          $ref: "#/components/responses/ValidationError"

        "422":
          $ref: "#/components/responses/UnprocessableEntity"

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Authenticates a user and issues tokens:
        - Returns `access_token` in the response body.
        - Sets `refresh_token` as an **HttpOnly cookie** (browser-managed).

        **Frontend note:** call this endpoint with credentials enabled (e.g. `withCredentials: true`)
        so the browser accepts the refresh cookie.
      operationId: loginUser
      security: [] # public endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"

      responses:
        "200":
          description: Logged in successfully.
          headers:
            Set-Cookie:
              description: |
                Sets `refresh_token` as an HttpOnly cookie.
                Example: `refresh_token=...; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_INVALID_CREDENTIALS
                  message: Email or password incorrect

        "422":
          description: Login blocked by business rules (e.g. email not verified).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_EMAIL_NOT_VERIFIED
                  message: Email must be verified before login

        "403":
          description: Account suspended (admin action).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_ACCOUNT_SUSPENDED
                  message: Account suspended by admin

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Issues a new `access_token` using the `refresh_token` stored in an **HttpOnly cookie**.

        - The frontend should call this endpoint with credentials enabled so cookies are included.
        - The server may rotate the refresh token by sending a new `Set-Cookie` header.
      operationId: refreshAccessToken
      security: [] # public endpoint (auth is via cookie)

      parameters:
        - name: refresh_token
          in: cookie
          required: true
          description: |
            Refresh token stored as an HttpOnly cookie.
            It is automatically sent by the browser (not accessible to JS).
          schema:
            type: string

      responses:
        "200":
          description: New access token issued successfully.
          headers:
            Set-Cookie:
              description: |
                Optional: refresh token rotation (new refresh_token cookie).
                Example: `refresh_token=...; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRefreshResponse"

        "401":
          description: Missing/invalid/expired refresh token cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_REFRESH_TOKEN_INVALID
                  message: Refresh token is missing, invalid, or expired

        "403":
          description: Account suspended (admin action).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_ACCOUNT_SUSPENDED
                  message: Account suspended by admin

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      description: |
        Logs the user out by clearing the `refresh_token` HttpOnly cookie.
        This endpoint is **idempotent**: it returns 200 even if the user is already logged out.
      operationId: logoutUser
      security: [] # cookie-based

      parameters:
        - name: refresh_token
          in: cookie
          required: false
          description: Refresh token cookie (if present). Browser sends it automatically.
          schema:
            type: string

      responses:
        "200":
          description: Logged out successfully (refresh cookie cleared).
          headers:
            Set-Cookie:
              description: |
                Clears the refresh token cookie.
                Example: `refresh_token=; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh; Max-Age=0`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Logged out successfully.

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      description: |
        Initiates the password reset process.

        If the email exists in the system, a password reset link will be sent
        to the user's email containing a secure reset token.

        For security reasons, the response is always the same even if the email
        does not exist to prevent account enumeration.

      operationId: requestPasswordReset
      security: [] # public endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthForgotPasswordRequest"

      responses:
        "200":
          description: Password reset email request processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthForgotPasswordResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using reset token
      description: |
        Resets the user's password using a password reset token that was sent by email.

        Requirements:
        - The token must be valid, unexpired, not revoked, and not already used.
        - The new password must meet the platform password rules.

      operationId: resetPassword
      security: [] # public endpoint

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResetPasswordRequest"

      responses:
        "200":
          description: Password reset successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Password reset successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "422":
          description: Token invalid/expired/used/revoked (business rule violation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_TOKEN_EXPIRED
                  message: Password reset token expired

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/change-email:
    post:
      tags: [Auth]
      summary: Request email change
      description: |
        Initiates the email change process for the authenticated user.

        A verification link will be sent to the new email address.
        The user must confirm the change by clicking the verification link.

      operationId: requestEmailChange

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChangeEmailRequest"

      responses:
        "200":
          description: Email change request processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Verification email sent to the new address.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "409":
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_EMAIL_ALREADY_EXISTS
                  message: Email already registered.

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/verify-email-change:
    post:
      tags: [Auth]
      summary: Confirm email change using token
      description: |
        Confirms and applies an email change using an `email_change` verification token
        sent to the new email address.

        Requirements:
        - Token must be valid, unexpired, not revoked, and not already used.
        - On success, the user's email is updated.

      operationId: verifyEmailChange
      security: [] # public endpoint (token-based)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyEmailChangeRequest"

      responses:
        "200":
          description: Email updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyEmailChangeResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "409":
          description: Email already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_EMAIL_ALREADY_EXISTS
                  message: Email already registered.

        "422":
          description: Token invalid/expired/used/revoked (business rule violation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_TOKEN_EXPIRED
                  message: Email change token expired

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/google:
    post:
      tags: [Auth]
      summary: Login / register with Google
      description: |
        Authenticates a user using Google Sign-In.

        The frontend obtains a Google `id_token` from Google and sends it here.
        The backend verifies the token with Google and then:
        - logs in the existing user OR creates a new account
        - returns `access_token` in the response body
        - sets `refresh_token` as an HttpOnly cookie

      operationId: googleLogin
      security: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthGoogleLoginRequest"

      responses:
        "200":
          description: Logged in successfully with Google.
          headers:
            Set-Cookie:
              description: Sets `refresh_token` as an HttpOnly cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          description: Google token invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AUTH_TOKEN_INVALID
                  message: Google token invalid

        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/oauth/soundcloud:
    get:
      tags: [Auth]
      summary: Start SoundCloud OAuth authorization
      description: |
        Redirects the user to SoundCloud's OAuth consent page.

        The backend generates the authorization URL using:
        - `client_id` (public)
        - `redirect_uri` (this callback endpoint)
        - `response_type=code`
        - `scope` (permissions)
        - `state` (CSRF protection)

        The user will be redirected back to `/auth/oauth/soundcloud/callback` with `code` and `state`.
      operationId: startSoundCloudOAuth
      security: [] # public

      parameters:
        - name: return_to
          in: query
          required: false
          description: Optional frontend URL to redirect to after successful OAuth.
          schema:
            type: string
            example: https://rythmify.com/settings/connections

      responses:
        "302":
          description: Redirect to SoundCloud consent screen.

  /auth/oauth/soundcloud/callback:
    get:
      tags: [Auth]
      summary: SoundCloud OAuth callback
      description: |
        Callback endpoint SoundCloud redirects to after the user approves access.

        The backend:
        1) Validates `state` (CSRF protection)
        2) Exchanges the authorization `code` with SoundCloud to obtain provider tokens
        3) Links the SoundCloud account to the current user OR creates a new user if needed
        4) Issues Rythmify tokens:
            - returns `access_token` in JSON
            - sets `refresh_token` as an HttpOnly cookie
      operationId: soundCloudOAuthCallback
      security: [] # public (provider redirects without JWT)

      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code returned by SoundCloud.
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: CSRF protection value generated at OAuth start.
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Error returned by SoundCloud if the user denied the request.
          schema:
            type: string

      responses:
        "200":
          description: OAuth completed successfully. Rythmify tokens issued.
          headers:
            Set-Cookie:
              description: Sets `refresh_token` as an HttpOnly cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"

        "400":
          description: Missing/invalid callback parameters or state mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Missing or invalid OAuth callback parameters

        "422":
          description: OAuth exchange failed or authorization denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: OAuth authorization was denied or token exchange failed

        "429":
          $ref: "#/components/responses/RateLimited"

  # ==========================================================
  # Module 2 — User Profile & Social Identity
  # ==========================================================

  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get a user profile by ID
      description: |
        Returns the public profile for the given user ID.

        Access rules:
        - Public profiles are accessible to anyone.
        - Private profiles are only accessible to the profile owner
          or users who follow them. All others receive `403`.
      operationId: getUserById
      security: [] # public endpoint; auth optional for private profile access
      parameters:
        - name: user_id
          in: path
          description: UUID of the target user.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User profile returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUserResponse"
        "403":
          description: Profile is private — requester is not the owner or a follower.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_PRIVATE
                  message: This profile is private.
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/role:
    patch:
      tags: [Users]
      summary: "Switch account role: Artist ↔ Listener"
      description: |
        Switches the authenticated user's role between `artist` and `listener`.

        - **Artist** unlocks track upload capabilities and makes the user appear
          in creator search results.
        - **Listener** restricts upload access.

        Notes:
        - Only `artist` and `listener` are self-assignable. The `admin` role
          cannot be requested through this endpoint.
        - Switching roles does **not** delete content. Tracks uploaded as an
          artist are retained but no further uploads are permitted until the
          role is switched back to `artist`.
      operationId: switchUserRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchRoleRequest"
      responses:
        "200":
          description: Role updated. Returns the full updated user object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnProfileResponse"
        "400":
          description: Invalid or non-self-assignable role value provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: role
                      issue: Must be one of artist, listener
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: User already has the requested role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_ALREADY_EXISTS
                  message: User already has the artist role.
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload or replace profile picture
      description: |
        Uploads a new profile picture. If one already exists, the old CDN asset
        is deleted and replaced.

        - Accepted formats: `image/jpeg`, `image/png`, `image/webp`
        - Maximum file size: **5 MB**
        - Image is resized server-side to standard avatar resolution (400×400 px)
        - Request must use `multipart/form-data` — do **not** set `Content-Type` manually.
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "200":
          description: Avatar uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarUploadResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File exceeds the 5 MB size limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UPLOAD_FILE_TOO_LARGE
                  message: Image file must not exceed 5 MB.
        "415":
          description: Unsupported image format — file is not JPEG, PNG, or WebP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UPLOAD_INVALID_FILE_TYPE
                  message: Unsupported file format. Accepted formats are JPEG, PNG, and WebP.
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Users]
      summary: Remove profile picture
      description: |
        Deletes the current profile picture and resets the `profile_picture`
        field to `null`. The CDN asset is queued for deletion asynchronously.
      operationId: deleteAvatar
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile picture removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Profile picture removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No profile picture set — nothing to delete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: No profile picture is set on this account.
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/cover:
    post:
      tags: [Users]
      summary: Upload or replace cover photo
      description: |
        Uploads a banner-style cover photo. If one already exists, the old CDN
        asset is deleted and replaced.

        - Accepted formats: `image/jpeg`, `image/png`, `image/webp`
        - Maximum file size: **10 MB**
        - Image is cropped server-side to standard banner resolution (1500×500 px)
        - Request must use `multipart/form-data` — do **not** set `Content-Type` manually.
      operationId: uploadCover
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CoverUploadRequest"
      responses:
        "200":
          description: Cover photo uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoverUploadResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File exceeds the 10 MB size limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UPLOAD_FILE_TOO_LARGE
                  message: Image file must not exceed 10 MB.
        "415":
          description: Unsupported image format — file is not JPEG, PNG, or WebP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UPLOAD_INVALID_FILE_TYPE
                  message: Unsupported file format. Accepted formats are JPEG, PNG, and WebP.
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Users]
      summary: Remove cover photo
      description: |
        Removes the current cover photo and resets the `cover_photo` field to
        `null`. The CDN asset is queued for deletion asynchronously.
      operationId: deleteCover
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cover photo removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Cover photo removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No cover photo set — nothing to delete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: No cover photo is set on this account.
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/web-profiles:
    get:
      tags: [Users]
      summary: List linked social / web profiles
      description: |
        Returns all external social account links and website URLs saved by
        the authenticated user.
      operationId: listWebProfiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of web profile objects returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebProfileListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Users]
      summary: Add a new social / web profile link
      description: |
        Adds a new external social or website link to the user's profile.

        - The `url` must be a valid `https://` URL.
        - Only one entry per `platform` is allowed per user.
      operationId: addWebProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWebProfileRequest"
      responses:
        "201":
          description: Web profile link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebProfileCreatedResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: A profile for this platform already exists for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_ALREADY_EXISTS
                  message: A profile for the instagram platform already exists.
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/web-profiles/{profile_id}:
    delete:
      tags: [Users]
      summary: Remove a linked social / web profile
      description: |
        Deletes a specific web profile entry by its UUID. Only the owner of
        the profile entry can delete it.
      operationId: deleteWebProfile
      security:
        - bearerAuth: []
      parameters:
        - name: profile_id
          in: path
          description: UUID of the web_profiles record to delete.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Web profile link removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Web profile removed.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/privacy:
    patch:
      tags: [Users]
      summary: Toggle profile public / private visibility
      description: |
        Sets the `is_private` flag on the authenticated user's account.

        Notes:
        - Privacy applies to the **profile page**, not to individual tracks.
        - Public tracks posted by a private user remain discoverable via their
          direct URLs.
      operationId: updatePrivacy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrivacyRequest"
      responses:
        "200":
          description: Privacy setting updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePrivacyResponse"
        "400":
          description: Missing or invalid `is_private` value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: is_private
                      issue: Must be a boolean value
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/me/genres:
    get:
      tags: [Users]
      summary: Get saved favorite genres
      description: |
        Returns the list of genre tags the authenticated user has saved as
        favorites.
      operationId: getMyGenres
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Favorite genres returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenresResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Users]
      summary: Replace the full list of favorite genres
      description: |
        Replaces the entire saved favorite genres list with the provided array.
        This is a **full replace** — genres not in the request are removed.

        - Send `[]` to clear all favorites.
        - Each genre string is validated against the platform's supported genres list.
        - Unrecognized values cause the entire request to be rejected.
        - Maximum of **10 genres** per user.
      operationId: replaceMyGenres
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceGenresRequest"
      responses:
        "200":
          description: Genres updated. Returns the saved list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenresResponse"
        "400":
          description: Array exceeds 10 items or contains unrecognized genre strings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: genres
                      issue: Maximum of 10 genres allowed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  # ==========================================================
  # Module 4 — Audio Upload & Track Management
  # ==========================================================

  /tags:
    get:
      tags: [Tracks]
      summary: Get all available platform tags
      description: |
        Returns the complete list of available tags that can be attached to tracks.

        Notes:
        - Public endpoint — no authentication required.
        - Tags are returned in alphabetical order.
        - Use the tag IDs from this list when uploading or updating tracks.
      operationId: listTags
      security: []
      responses:
        "200":
          description: Tags fetched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks:
    post:
      tags: [Tracks]
      summary: Upload a new audio track
      description: |
        Uploads an audio file and creates a new track record for the authenticated user.

        Notes:
        - Request must use `multipart/form-data` — do **not** set `Content-Type` manually.
        - Accepted formats: MP3, WAV, FLAC, AAC. Maximum file size: **100 MB**.
        - Track is created immediately with `status: processing`. Once transcoding completes, status transitions to `ready`.
        - `stream_url`, `preview_url`, `waveform_url`, `duration`, and `bitrate` are `null` until processing finishes.
        - Upload counts against the user's hourly upload limit (20 uploads / hour). On limit breach, the server returns `403`.
      operationId: uploadTrack
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadTrackRequest"
      responses:
        "201":
          description: Track created and queued for processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadTrackResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          # Upload limit reached or feature restricted (403).
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/FileTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks/me:
    get:
      tags: [Tracks]
      summary: List authenticated user's own tracks
      description: |
        Returns a paginated list of all tracks belonging to the authenticated user, including private tracks.

        Notes:
        - Returns both `ready` and `processing` tracks. Use `status` to filter client-side if needed.
        - Private tracks are included because this endpoint is owner-scoped.
        - Supports pagination via `page` and `limit` query parameters.
      operationId: getMyTracks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based).
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of tracks per page (max 100).
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter tracks by processing status.
          schema:
            $ref: "#/components/schemas/TrackStatus"
      responses:
        "200":
          description: Paginated list of the authenticated user's tracks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks/{track_id}:
    get:
      tags: [Tracks]
      summary: Get track details by ID
      description: |
        Returns the full track object for the given track ID.

        Notes:
        - Public tracks are accessible to anyone (no auth required).
        - Private tracks (`is_public: false`) are only accessible to their owner. Unauthenticated requests or requests from non-owners return `403` with `RESOURCE_PRIVATE`.
        - Tracks still in `processing` state are returned with `null` values for `stream_url`, `preview_url`, `waveform_url`, `duration`, and `bitrate`.
      operationId: getTrack
      security: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Track details returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackResponse"
        "403":
          $ref: "#/components/responses/Forbidden" # Triggered when the track is private and the requester is not the owner (RESOURCE_PRIVATE)
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Tracks]
      summary: Update track metadata
      description: |
        Updates one or more metadata fields for the specified track.

        Notes:
        - Only the track owner can update a track. Non-owners receive `403` with `PERMISSION_NOT_OWNER`.
        - All fields are optional — only provided fields are updated (partial update).
      operationId: updateTrack
      security:
        - bearerAuth: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrackRequest"
      responses:
        "200":
          description: Track metadata updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Tracks]
      summary: Delete a track permanently
      description: |
        Permanently deletes the specified track and all associated data (comments, likes, reposts, tags).

        Notes:
        - Only the track owner can delete their track. Non-owners receive `403` with `PERMISSION_NOT_OWNER`.
        - Deletion is irreversible — the audio file and all derived assets (stream, preview, waveform) are removed from storage.
        - Returns `204 No Content` on success — no response body.
      operationId: deleteTrack
      security:
        - bearerAuth: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track to delete.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Track deleted successfully. No response body.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks/{track_id}/stream:
    get:
      tags: [Tracks]
      summary: Get streaming URL for a track
      description: |
        Returns the streaming URL for the specified track.

        Notes:
        - Public endpoint — no authentication required for public tracks.
        - Private tracks are only accessible to their owner. Non-owner requests return `403` with `RESOURCE_PRIVATE`.
        - If the track is still processing (`status: processing`), `stream_url` will be `null` and a `202 Accepted` is returned to signal the caller to retry later.
        - If transcoding failed (`status: failed`), `503` is returned with `UPLOAD_PROCESSING_FAILED`.
      operationId: getTrackStreamUrl
      security: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Streaming URL returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackStreamResponse"
        "202":
          description: Track is still being processed — retry later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: Track is still processing. Please retry shortly.
        "403":
          # Triggered when the requesting user is not the owner and the track is private
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/TrackProcessingFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks/{track_id}/waveform:
    get:
      tags: [Tracks]
      summary: Get waveform peak data for a track
      description: |
        Returns an array of normalized amplitude values used to render the waveform visualizer.

        Notes:
        - Public endpoint — no authentication required for public tracks.
        - Private tracks are only accessible to their owner.
      operationId: getTrackWaveform
      security: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Waveform peak data returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackWaveformResponse"
        "202":
          description: Waveform not yet generated — track is still processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: Waveform is not yet available. Track is still processing.
        "403":
          # Triggered when the requesting user is not the track owner and the track is private (RESOURCE_PRIVATE)
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/TrackProcessingFailed"

  /tracks/{track_id}/visibility:
    patch:
      tags: [Tracks]
      summary: Toggle track visibility (public / private)
      description: |
        Sets the `is_public` flag on the specified track, making it either publicly searchable or privately accessible by link.

        Notes:
        - Only the track owner can change visibility. Non-owners receive `403`.
        - A private track (`is_public: false`) is excluded from search results and public feeds.
        - This endpoint only updates `is_public` — use `PATCH /tracks/:id` to update other metadata.
      operationId: updateTrackVisibility
      security:
        - bearerAuth: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrackVisibilityRequest"
      responses:
        "200":
          description: Track visibility updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrackVisibilityResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          # Triggered when the requesting user is not the track owner (PERMISSION_NOT_OWNER)
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{user_id}/tracks:
    get:
      tags: [Tracks]
      summary: List all public tracks by a user
      description: |
        Returns a paginated list of public tracks uploaded by the specified user.

        Notes:
        - Public endpoint — no authentication required.
        - Only `ready` and `is_public: true` tracks are returned. Private and processing tracks are excluded.
        - If the authenticated user wants their own tracks (including private), use `GET /tracks/me` instead.
        - Tracks are ordered by `created_at` descending (newest first).
      operationId: getUserTracks
      security: []
      parameters:
        - name: user_id
          in: path
          required: true
          description: UUID of the user whose public tracks to retrieve.
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (1-based).
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of tracks per page (max 100).
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated list of the user's public tracks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==========================================================
  # Module 5 — Playback & Streaming Engine
  # ==========================================================

  /tracks/{track_id}/play:
    post:
      tags: [Tracks]
      summary: Record a play event and get stream URL
      description: |
        Called when the user presses play. Performs three operations atomically:
        1. Checks playability for the requesting user and determines access level.
        2. Increments the track's `play_count`.
        3. Inserts a row into `listening_history`.

        Returns the appropriate URL based on access level:
        - `full` — returns `stream_url` (authenticated user with full access).
        - `preview` — returns `preview_url` (free-tier or unauthenticated users).
        - `blocked` — returns `403` with reason code, no URL.

        Notes:
        - No auth required for public tracks — unauthenticated users receive preview access.
        - Play count is only incremented once the stream actually starts, not on URL fetch.
        - If track status is `processing`, returns `202`. If `failed`, returns `503`.
      operationId: recordPlayEvent
      security: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track to play.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Playback access granted — stream or preview URL returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordPlayResponse"
        "202":
          description: Track is still processing — retry later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: Track is still processing. Please retry shortly.
        "403":
          $ref:
            "#/components/responses/Forbidden"
            # Triggered when the Account tier too low for full playback (ACCESS_LEVEL_PREVIEW) or when the track is private or when user suspended
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/TrackProcessingFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /tracks/{track_id}/playback-state:
    get:
      tags: [Tracks]
      summary: Check playability for the requesting user
      description: |
        Returns the playback access level for the requesting user before they attempt to play.
        Used by the client to render the correct UI state — full play button, preview badge, or blocked/locked state.

        Access levels:
        - `full` — user can stream the entire track.
        - `preview` — user can only play the 30-second preview clip.
        - `blocked` — user cannot play the track at all (region lock or account suspension).

        Notes:
        - Public endpoint — works for unauthenticated users (they receive `preview` access for public tracks).
        - Does **not** record a play event or increment `play_count`.
        - Does **not** return a stream URL — call `POST /tracks/:id/play` to get the URL.
      operationId: getPlaybackState
      security: []
      parameters:
        - name: track_id
          in: path
          required: true
          description: UUID of the track.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Playback access level returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackStateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /me/player/state:
    get:
      tags: [Tracks]
      summary: Get last saved player state
      description: |
        Restores the authenticated user's persistent player state — used to resume playback
        across sessions, devices, and page refreshes.

        Returns `null` for `data` if no state has been saved yet (first session).

        Notes:
        - Queue is returned as an ordered array of track IDs.
      operationId: getPlayerState
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Player state returned successfully. `data` is `null` if no state saved yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Tracks]
      summary: Save persistent player state
      description: |
        Persists the authenticated user's current player state so it can be restored
        on next session or across devices.

        Notes:
        - Overwrites any previously saved state — this is not append-only.
        - `queue` is an ordered array of track IDs representing the current play queue.
        - `position_seconds` is the playback position within the current track.
      operationId: savePlayerState
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePlayerStateRequest"
      responses:
        "200":
          description: Player state saved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStateResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /me/history:
    get:
      tags: [Tracks]
      summary: Get recently played tracks
      description: |
        Returns a deduplicated list of the most recently played tracks for the authenticated user.
        Used for "Jump back in" and "Recently played" UI rows.

        Notes:
        - Deduplicated by `track_id` — only the most recent play of each track is returned.
        - Capped at 20 entries — not paginated.
        - Ordered by `played_at` descending (most recent first).
      operationId: getRecentlyPlayed
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recently played tracks returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentlyPlayedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Tracks]
      summary: Clear listening history
      description: |
        Permanently deletes all listening history entries for the authenticated user.
        Clears both the recently played list and the full paginated history.

        Notes:
        - Irreversible — deleted history cannot be recovered.
        - Returns `204 No Content` on success — no response body.
        - Also resets the player state saved queue if it references deleted history entries.
      operationId: clearListeningHistory
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Listening history cleared successfully. No response body.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /me/listening-history:
    get:
      tags: [Tracks]
      summary: Full paginated listening history
      description: |
        Returns the complete play-by-play listening history for the authenticated user,
        paginated and ordered by `played_at` descending.

        Notes:
        - Not deduplicated — every individual play event is returned as a separate entry.
        - For the deduplicated "recently played" view, use `GET /me/history`.
        - Supports standard pagination via `page` and `limit` query parameters.
      operationId: getListeningHistory
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based).
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Number of entries per page (max 100).
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated listening history returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListeningHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  # ==========================================================
  # Module 7 — Sets & Playlists
  # ==========================================================

  /playlists:
    post:
      tags: [Playlists]
      summary: Create a playlist
      description: |
        Creates a new playlist (set) for the authenticated user.

        Notes:
        - If `is_public=false`, the playlist is treated as "secret/private" (shareable by token/link).
        - Playlist count limits may apply depending on the user's subscription plan.
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistRequest"

      responses:
        "201":
          description: Playlist created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistResponse"
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: "Gym Mix"
                  description: "High energy tracks"
                  is_public: true
                  track_count: 0
                  like_count: 0
                  created_at: "2026-03-06T10:00:00Z"
                message: "Playlist created successfully."

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "422":
          description: Business rule violation (e.g., playlist limit reached).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_LIMIT_REACHED
                  message: Playlist limit reached for your current plan.

        "429":
          $ref: "#/components/responses/RateLimited"

    get:
      tags: [Playlists]
      summary: List playlists
      description: |
        Returns a paginated list of playlists.

        By default, this returns **public** playlists.

        To list the authenticated user's playlists, set `mine=true` and include Bearer auth.
      operationId: listPlaylists
      security: [] # public by default; auth required only when mine=true

      parameters:
        - name: mine
          in: query
          required: false
          description: If true, returns the authenticated user's playlists (public + private).
          schema:
            type: boolean
            default: false

        - name: owner_user_id
          in: query
          required: false
          description: Filter playlists by owner user ID (public only unless mine=true and requester is owner).
          schema:
            type: string
            format: uuid

        - name: q
          in: query
          required: false
          description: Search by playlist name (simple contains match).
          schema:
            type: string
            maxLength: 100

        - name: limit
          in: query
          required: false
          description: Page size.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20

        - name: offset
          in: query
          required: false
          description: Pagination offset.
          schema:
            type: integer
            minimum: 0
            default: 0

      responses:
        "200":
          description: Playlists returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "429":
          $ref: "#/components/responses/RateLimited"

  /playlists/{playlist_id}:
    get:
      tags: [Playlists]
      summary: Get playlist details
      description: |
        Returns playlist metadata and its tracks in order.

        Access rules:
        - Public playlists: accessible to anyone.
        - Private (secret) playlists: accessible if either:
          1) the requester is the owner (via Bearer token), OR
          2) `secret_token` is provided.

        Note: `secret_token` is never returned in the response.
      operationId: getPlaylistById
      security: [] # public endpoint (Authorization header may still be sent optionally)

      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

        - name: secret_token
          in: query
          required: false
          description: Required only to access private/secret playlists when not authenticated as the owner.
          schema:
            type: string

        - name: include_tracks
          in: query
          required: false
          description: If false, returns only playlist metadata (no tracks array).
          schema:
            type: boolean
            default: true

      responses:
        "200":
          description: Playlist returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistGetResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Not allowed to access this playlist (private and missing permission/token).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_ACCESS_DENIED
                  message: You do not have access to this playlist.

        "404":
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        "429":
          $ref: "#/components/responses/RateLimited"

    patch:
      tags: [Playlists]
      summary: Update playlist
      description: |
        Updates playlist metadata for the authenticated owner.

        Editable fields:
        - `name`
        - `description`
        - `is_public`

        Notes:
        - Only the playlist owner can update a playlist.
        - If `is_public=false`, the playlist becomes secret/private.
      operationId: updatePlaylist
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaylistRequest"

      responses:
        "200":
          description: Playlist updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistResponse"
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: "Updated Gym Mix"
                  description: "Updated high energy tracks"
                  is_public: false
                  track_count: 12
                  like_count: 340
                  created_at: "2026-03-06T10:00:00Z"
                message: Playlist updated successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Only the playlist owner can update this playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to update this playlist.

        "404":
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        "422":
          description: Business rule violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_RULE_VIOLATION
                  message: At least one updatable field must be provided.

        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      tags: [Playlists]
      summary: Delete playlist
      description: |
        Deletes a playlist owned by the authenticated user.

        Notes:
        - Only the playlist owner can delete a playlist.
        - Deleting a playlist also removes its playlist_tracks entries.
      operationId: deletePlaylist
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Playlist deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Playlist deleted successfully.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Only the playlist owner can delete this playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to delete this playlist.

        "404":
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        "429":
          $ref: "#/components/responses/RateLimited"

  /playlists/{playlist_id}/tracks:
    post:
      tags: [Playlists]
      summary: Add track to playlist
      description: |
        Adds a track to a playlist owned by the authenticated user.

        Ordering rules:
        - If `position` is provided, the track is inserted at that position and existing tracks
          at/after that position shift down.
        - If `position` is not provided, the track is appended to the end.

        Notes:
        - A track cannot appear twice in the same playlist.
        - Only the playlist owner can add tracks.
      operationId: addTrackToPlaylist
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrackToPlaylistRequest"

      responses:
        "201":
          description: Track added successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistGetResponse"
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: "Gym Mix"
                  description: "High energy tracks"
                  is_public: true
                  created_at: "2026-03-06T10:00:00Z"
                  track_count: 3
                  like_count: 0
                  tracks:
                    - track_id: e5f6a7b8-c9d0-1234-efab-567890abcdef
                      position: 1
                      added_at: "2026-03-06T10:01:00Z"
                    - track_id: 11111111-2222-3333-4444-555555555555
                      position: 2
                      added_at: "2026-03-06T10:02:00Z"
                    - track_id: 99999999-aaaa-bbbb-cccc-dddddddddddd
                      position: 3
                      added_at: "2026-03-06T10:03:00Z"
                message: Track added to playlist successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Only the playlist owner can modify this playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to modify this playlist.

        "404":
          description: Playlist or track not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                playlistNotFound:
                  value:
                    error:
                      code: PLAYLIST_NOT_FOUND
                      message: Playlist not found.
                trackNotFound:
                  value:
                    error:
                      code: TRACK_NOT_FOUND
                      message: Track not found.

        "409":
          description: Track already exists in the playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_TRACK_ALREADY_EXISTS
                  message: Track already exists in this playlist.

        "422":
          description: Business rule violation (invalid position).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_POSITION_INVALID
                  message: Position must be between 1 and the next available position.

        "429":
          $ref: "#/components/responses/RateLimited"

  /playlists/{playlist_id}/tracks/reorder:
    patch:
      tags: [Playlists]
      summary: Reorder tracks in playlist
      description: |
        Reorders tracks inside a playlist owned by the authenticated user.

        Rules:
        - Provide the full ordered list of tracks with their new `position` values (1-based).
        - Positions must be unique and start at 1 with no gaps.
        - All track_ids must already exist in the playlist.
      operationId: reorderPlaylistTracks
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPlaylistTracksRequest"

      responses:
        "200":
          description: Playlist tracks reordered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistGetResponse"
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: "Gym Mix"
                  description: "High energy tracks"
                  is_public: true
                  created_at: "2026-03-06T10:00:00Z"
                  track_count: 3
                  like_count: 0
                  tracks:
                    - track_id: 99999999-aaaa-bbbb-cccc-dddddddddddd
                      position: 1
                      added_at: "2026-03-06T10:03:00Z"
                    - track_id: e5f6a7b8-c9d0-1234-efab-567890abcdef
                      position: 2
                      added_at: "2026-03-06T10:01:00Z"
                    - track_id: 11111111-2222-3333-4444-555555555555
                      position: 3
                      added_at: "2026-03-06T10:02:00Z"
                message: Playlist tracks reordered successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Only the playlist owner can modify this playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to modify this playlist.

        "404":
          description: Playlist not found (or track not found in playlist).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                playlistNotFound:
                  value:
                    error:
                      code: PLAYLIST_NOT_FOUND
                      message: Playlist not found.
                trackNotInPlaylist:
                  value:
                    error:
                      code: PLAYLIST_TRACK_NOT_FOUND
                      message: One or more tracks are not in this playlist.

        "422":
          description: Business rule violation (bad positions).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                positionsInvalid:
                  value:
                    error:
                      code: PLAYLIST_POSITIONS_INVALID
                      message: Positions must start at 1 with no gaps and be unique.
                notFullList:
                  value:
                    error:
                      code: PLAYLIST_REORDER_REQUIRES_FULL_LIST
                      message: Reorder requires a full list of playlist tracks.

        "429":
          $ref: "#/components/responses/RateLimited"

  /playlists/{playlist_id}/tracks/{track_id}:
    delete:
      tags: [Playlists]
      summary: Remove track from playlist
      description: |
        Removes a track from a playlist owned by the authenticated user.

        Notes:
        - Only the playlist owner can remove tracks.
        - After removal, the server should re-normalize positions so they remain 1..N with no gaps.
      operationId: removeTrackFromPlaylist
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

        - name: track_id
          in: path
          required: true
          description: Track ID to remove.
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Track removed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistGetResponse"
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: "Gym Mix"
                  description: "High energy tracks"
                  is_public: true
                  created_at: "2026-03-06T10:00:00Z"
                  track_count: 2
                  like_count: 0
                  tracks:
                    - track_id: e5f6a7b8-c9d0-1234-efab-567890abcdef
                      position: 1
                      added_at: "2026-03-06T10:01:00Z"
                    - track_id: 11111111-2222-3333-4444-555555555555
                      position: 2
                      added_at: "2026-03-06T10:02:00Z"
                message: Track removed from playlist successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Only the playlist owner can modify this playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to modify this playlist.

        "404":
          description: Playlist not found or track not in playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                playlistNotFound:
                  value:
                    error:
                      code: PLAYLIST_NOT_FOUND
                      message: Playlist not found.
                trackNotInPlaylist:
                  value:
                    error:
                      code: PLAYLIST_TRACK_NOT_FOUND
                      message: Track not found in this playlist.

        "429":
          $ref: "#/components/responses/RateLimited"

  /playlists/{playlist_id}/embed:
    get:
      tags: [Playlists]
      summary: Generate playlist embed code
      description: |
        Generates an embeddable iframe snippet for a playlist.

        Access rules:
        - Public playlists: accessible to anyone.
        - Private playlists: require `secret_token` unless the requester is the owner.

        The returned iframe can be used on external websites to embed the playlist player.
      operationId: getPlaylistEmbed
      security: [] # public

      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

        - name: secret_token
          in: query
          required: false
          description: Secret token required for private playlists.
          schema:
            type: string

        - name: theme
          in: query
          required: false
          description: Player theme.
          schema:
            type: string
            enum: [light, dark]
            default: light

        - name: autoplay
          in: query
          required: false
          description: Whether the embedded player should autoplay.
          schema:
            type: boolean
            default: false

        - name: width
          in: query
          required: false
          description: Width of the iframe player.
          schema:
            type: integer
            minimum: 200
            maximum: 1200
            default: 600

        - name: height
          in: query
          required: false
          description: Height of the iframe player.
          schema:
            type: integer
            minimum: 100
            maximum: 600
            default: 200

      responses:
        "200":
          description: Embed code generated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistEmbedResponse"
              example:
                data:
                  embed_url: https://api.rythmify.com/embed/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  iframe_html: "<iframe src='https://api.rythmify.com/embed/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa' width='600' height='200' frameborder='0'></iframe>"
                message: Playlist embed code generated successfully.

        "404":
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        "403":
          description: Playlist is private and no valid secret token was provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PLAYLIST_ACCESS_DENIED
                  message: Private playlist requires a valid secret token.

        "429":
          $ref: "#/components/responses/RateLimited"

  # ==========================================================
  # Module 8 — Feed, Search & Discovery
  # ==========================================================

  /feed:
    get:
      tags: [Feed]
      summary: Get activity feed
      description: |
        Returns a chronological feed of new tracks from artists the authenticated user follows.

        **Rate limit:** 60 requests per minute
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular]
            default: newest
          description: Sort order for feed items
        - name: genre
          in: query
          schema:
            type: string
          description: Filter feed by genre (e.g. electronic, lo-fi, hip-hop)

      responses:
        "200":
          description: Feed retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedTrack"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

        "401":
          $ref: "#/components/responses/Unauthorized"

  /feed/trending:
    get:
      tags: [Feed]
      summary: Get trending tracks
      description: |
        Returns tracks ranked by recent play count and engagement velocity.
        Each result includes a `rank` and `trend_score`.

        **Rate limit:** 60 requests per minute
      security: []
      parameters:
        - name: genre
          in: query
          schema:
            type: string
          description: Filter by genre
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month] # [F11] removed `year` — not in reference spec
            default: week
          description: Time window for trending calculation
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

      responses:
        "200":
          description: Trending tracks retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrendingTrack"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

        "400":
          $ref: "#/components/responses/ValidationError"

  /search:
    get:
      tags: [Search]
      summary: Global search
      description: |
        Search across tracks, users, and playlists using keyword matching.
        All result items include a relevance `score` field (0–1).

        **Rate limit:** 60 requests per minute
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search keyword (min 2 characters)
          example: summer

        - name: type
          in: query
          schema:
            type: string
            enum: [tracks, users, playlists]
          description: Limit results to a specific resource type. Omit to return all.

        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, newest, plays]
            default: relevance
          description: Sort order for search results

        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

      responses:
        "200":
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tracks:
                        type: array
                        items:
                          $ref: "#/components/schemas/TrackSearchResult"
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserSearchResult"
                      playlists:
                        type: array
                        items:
                          $ref: "#/components/schemas/PlaylistSearchResult"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

        "400":
          $ref: "#/components/responses/ValidationError"

  /resolve:
    get:
      tags: [Search]
      summary: Resolve permalink to resource
      description: |
        Resolves a Rythmify permalink (URL) to its corresponding resource.
        Returns the resource type and ID so the client can fetch full details.

        **Supported URLs:**
        - https://rythmify.com/tracks/{id}
        - https://rythmify.com/users/{username}
        - https://rythmify.com/playlists/{id}
      security: [] # public endpoint — no 401
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Full Rythmify URL to resolve
          example: https://rythmify.com/tracks/abc-123

      responses:
        "200":
          description: Permalink resolved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      type: # [F1] was: resource_type
                        type: string
                        enum: [track, user, playlist]
                        example: track
                      id: # [F1] was: resource_id
                        type: string
                        format: uuid
                        example: abc-123-def-456
                      permalink: # [F1] was: url
                        type: string
                        format: uri
                        description: Canonical Rythmify URL for this resource
                        example: https://rythmify.com/tracks/abc-123

        "400":
          description: Invalid URL format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Invalid Rythmify URL

        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: The requested resource does not exist
        # [F2] 401 removed — this is a public endpoint (security: [])

  # ==========================================================
  # Module 9 — Messaging & Track Sharing
  # ==========================================================

  /messages/conversations:
    get:
      tags: [Messages]
      summary: List all conversations
      description: |
        Returns all conversations, sorted by most recent message. Includes the last message preview, unread count per conversation, and partner profile.
      operationId: listConversations
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 50
            default: 20
            minimum: 1

      responses:
        "200":
          description: Paginated list of conversations returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/conversations/{conversationId}:
    get:
      tags: [Messages]
      summary: Get a single conversation with messages
      description: |
        Returns the full messages between the user and a single conversation partner, sorted oldest to newest.
      operationId: getConversation
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          description: UUID of the conversation.
          required: true
          schema:
            type: string
            format: uuid

        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            default: 50
            minimum: 1

      responses:
        "200":
          description: Conversation and messages returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetailResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Messages]
      summary: Delete a conversation
      description: |
        Soft-deletes the conversation for the authenticated user only. The other participant's copy is unaffected. If both participants delete the conversation, all associated messages are permanently removed.
      operationId: deleteConversation
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          description: UUID of the conversation to delete.
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Conversation deleted for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: Conversation deleted.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/conversations/{conversationId}/messages:
    post:
      tags: [Messages]
      summary: Send a message in a conversation
      description: |
        Sends a message. Can include plain text, or an embedded track/playlist card by providing the resource field.
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          description: UUID of the conversation.
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"

      responses:
        "201":
          description: Message sent successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageCreatedResponse"

        "400":
          description: |
            Message body is empty, exceeds length limit, or both text and embed fields are missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: |
            Sender is blocked by the recipient, or the recipient has disabled messages from non-followers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "404":
          $ref: "#/components/responses/NotFound"

        "429":
          $ref: "#/components/responses/RateLimited"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/conversations/{conversationId}/messages/{messageId}:
    delete:
      tags: [Messages]
      summary: Delete a specific message
      description: |
        Deletes a single message sent by the authenticated user. The message is removed from both participants' views. Only the original sender can delete their own messages.
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          description: UUID of the conversation.
          required: true
          schema:
            type: string
            format: uuid

        - name: messageId
          in: path
          description: UUID of the message to delete.
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Message deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: Message deleted.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/new:
    post:
      tags: [Messages]
      summary: Start a new conversation
      description: |
        Creates a new 1-to-1 conversation with another user and sends the first message in a single request. If a conversation between the same two users already exists, the new message is appended to the existing thread.
      operationId: startConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationRequest"

      responses:
        "201":
          description: Conversation created and first message sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationCreatedResponse"

        "200":
          description: |
            Existing conversation found — message appended to existing thread.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageCreatedResponse"

        "400":
          description: Missing recipient, empty message body, or self-messaging attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          description: Recipient has blocked the sender.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "404":
          description: Recipient user not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "429":
          $ref: "#/components/responses/RateLimited"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/unread-count:
    get:
      tags: [Messages]
      summary: Get total unread message count
      description: |
        Returns the total number of unread messages across all conversations.
      operationId: getUnreadMessageCount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread message count returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/block/{userId}:
    post:
      tags: [Messages]
      summary: Block a user from messaging
      description: |
        Blocks a user from sending messages. Existing conversations are preserved but the blocked user cannot send new messages. This is a message-level block and does not affect follows or other interactions.
      operationId: blockMessagingUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          description: UUID of the user to block from messaging.
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: User blocked from messaging.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: User blocked from messaging.

        "400":
          description: Cannot block yourself.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          $ref: "#/components/responses/NotFound"

        "409":
          description: User is already blocked from messaging.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags: [Messages]
      summary: Unblock a user from messaging
      description: |
        Removes the message-level block on a specific user, allowing them to send messages again.
      operationId: unblockMessagingUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          description: UUID of the user to unblock.
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: User unblocked from messaging.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: User unblocked from messaging.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          $ref: "#/components/responses/NotFound"

        "500":
          $ref: "#/components/responses/InternalError"

  /messages/conversations/{conversationId}/messages/{messageId}/read:
    patch:
      tags:
        - Messages
      summary: Mark a message as read or unread
      description: >
        Toggles the read state of a specific message in a conversation.
        Pass is_read: true to mark as read, or is_read: false to mark
        as unread.
        Marking a message as read also decrements the conversation's
        unread_count by 1.
      operationId: markMessageReadState
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          description: UUID of the conversation.
          required: true
          schema:
            type: string
            format: uuid
        - name: messageId
          in: path
          description: UUID of the message to update.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkMessageReadRequest"
      responses:
        "200":
          description: Message read state updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkMessageReadResponse"
        "400":
          description: Missing or invalid is_read value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden" # Only the message recipient can change read state
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Message is already in the requested read state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================
  # Module 9 — Messaging & Track Sharing
  # ==========================================================
  /notifications:
    get:
      tags: [Notifications]
      summary: Get in-app notification feed
      description: |
        Returns a paginated list of notifications for the authenticated user,
        ordered by most recent first.

        Each notification includes its type, who triggered it, the related
        resource, and its read state.

        Supported types: `follow`, `like`, `repost`, `comment`.
      operationId: getNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 50
            default: 20
            minimum: 1
        - name: unread_only
          in: query
          description: If true, returns only unread notifications.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Notification feed returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      description: |
        Returns the total number of unread notifications for the authenticated user.
      operationId: getUnreadNotificationCount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread notification count returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      description: |
        Sets all unread notifications for the authenticated user to
        `is_read: true` in a single operation. Resets the unread counter to 0.
      operationId: markAllNotificationsRead
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: All notifications marked as read.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/{notification_id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a single notification as read
      description: |
        Sets the specified notification's `is_read` field to `true`.
        Only the notification owner can mark their own notifications as read.
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          description: UUID of the notification to mark as read.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification marked as read.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Notification marked as read.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/{notification_id}:
    delete:
      tags: [Notifications]
      summary: Delete a notification
      description: |
        Permanently deletes a single notification from the authenticated user's feed.
      operationId: deleteNotification
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          description: UUID of the notification to delete.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Notification deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/push/register:
    post:
      tags: [Notifications]
      summary: Register a device push token
      description: |
        Registers a mobile device push token (FCM or APNs) for the authenticated user.
        A user can have multiple registered devices.

        If the token already exists, the registration is refreshed (no-op with 200).
      operationId: registerPushToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "200":
          description: Push token registered or refreshed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Push token registered.
        "400":
          description: Missing or malformed push token or platform value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: platform
                      issue: Must be one of android, ios
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/push/unregister:
    post:
      tags: [Notifications]
      summary: Unregister a device push token
      description: |
        Removes a push token for the authenticated user, stopping push
        notifications on that device.
      operationId: unregisterPushToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterPushTokenRequest"
      responses:
        "200":
          description: Push token removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                data:
                  success: true
                message: Push token unregistered.
        "400":
          description: Missing token field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: token
                      issue: This field is required
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Token not found for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: Push token not found for this account.
        "500":
          $ref: "#/components/responses/InternalError"

  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get notification preferences
      description: |
        Returns the authenticated user's current notification preference flags,
        controlling which event types trigger push and in-app notifications.
      operationId: getNotificationPreferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notification preferences returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Notifications]
      summary: Update notification preferences
      description: |
        Partially updates the authenticated user's notification preferences.
        Only fields present in the request body are updated.
      operationId: updateNotificationPreferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferencesRequest"
      responses:
        "200":
          description: Preferences updated. Returns the full updated preferences object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesResponse"
        "400":
          description: Invalid preference field or non-boolean value provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: like_push
                      issue: Must be a boolean value
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==========================================================
  # Module 11 — Moderation & Admin Dashboard
  # ==========================================================

  /reports:
    post:
      tags: [Moderation]
      summary: Submit a content report
      description: |
        Report a track or user profile for inappropriate content or copyright infringement.
        Authenticated users can submit reports which enter the admin review queue.

        **Supported resource types:**
        - `track` — accepts reasons: `copyright`, `inappropriate`
        - `user`  — accepts reasons: `inappropriate`, `spam`, `impersonation`

        **Note:** The `copyright` reason is only valid when `resource_type` is `track`.
        Submitting `copyright` with `resource_type: user` will return a 400 validation error.

        **Rate limit:** 10 reports per hour per user
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
            examples:
              report_track:
                summary: Report a track for copyright
                value:
                  resource_type: track
                  resource_id: a1234567-89ab-cdef-0123-456789abcdef
                  reason: copyright
                  description: This track uses unlicensed material from XYZ artist.
              report_user:
                summary: Report a user for spam
                value:
                  resource_type: user
                  resource_id: b2345678-9abc-def0-1234-56789abcdef0
                  reason: spam
                  description: This account is posting spam comments on multiple tracks.

      responses:
        "201":
          description: Report submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"
                  message:
                    type: string
                    example: Report submitted successfully. Our team will review it shortly.

        "400":
          description: |
            Validation error — e.g. `copyright` reason used with `resource_type: user`,
            or required fields missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: VALIDATION_FAILED
                  message: Validation failed
                  details:
                    - field: reason
                      issue: Copyright reason is only valid for track reports.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          description: Reported resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: The reported resource was not found

        "409":
          description: User already reported this resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: RESOURCE_ALREADY_EXISTS
                  message: You have already reported this resource

        "429":
          $ref: "#/components/responses/RateLimited"

  /admin/reports:
    get:
      tags: [Admin]
      summary: List all reports (admin only)
      description: |
        Returns all content reports for admin review.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, resolved, dismissed]
          description: Filter by report status

        - name: reason # [F3] ADDED — was missing from original
          in: query
          schema:
            type: string
            enum: [copyright, inappropriate, spam, impersonation]
          description: Filter by report reason

        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

      responses:
        "200":
          description: Reports retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportDetailed"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/reports/{id}:
    # [F4] THIS ENTIRE ENDPOINT WAS MISSING — now added
    get:
      tags: [Admin]
      summary: Get a single report (admin only)
      description: |
        Returns full details of a single report by ID.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Report ID

      responses:
        "200":
          description: Report retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReportDetailed"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Admin]
      summary: Resolve or dismiss a report (admin only)
      description: |
        Update report status to resolved or dismissed.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Report ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [resolved, dismissed]
                  description: New report status
                admin_note: # [F5] was: notes
                  type: string
                  description: Admin notes about the resolution decision
            example:
              status: resolved
              admin_note: Copyright holder confirmed. Content removed.

      responses:
        "200":
          description: Report updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object # [F6] slim response instead of full Report
                    properties:
                      id:
                        type: string
                        format: uuid
                        example: r1234567-89ab-cdef-0123-456789abcdef
                      status:
                        type: string
                        enum: [resolved, dismissed]
                        example: resolved
                      resolved_at:
                        type: string
                        format: date-time
                        example: "2026-03-06T08:30:00Z"
                  message:
                    type: string
                    example: Report status updated successfully
              example:
                data:
                  id: r1234567-89ab-cdef-0123-456789abcdef
                  status: resolved
                  resolved_at: "2026-03-06T08:30:00Z"
                message: Report status updated successfully

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

  /admin/tracks/{id}:
    # [F7] DELETE now returns 204 No Content (was 200 with body)
    delete:
      tags: [Admin]
      summary: Delete a track (admin only)
      description: |
        Permanently deletes a track and all associated data.
        This action cannot be undone.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Track ID

      responses:
        "204":
          description: Track deleted successfully — no response body

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Admin]
      summary: Hide/unhide a track (admin only)
      description: |
        Hide a track from public view without deleting it.
        Hidden tracks are not searchable and cannot be played.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Track ID

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_hidden]
              properties:
                is_hidden:
                  type: boolean
                  description: True to hide, false to unhide
                reason:
                  type: string
                  description: Reason for hiding (shown to track owner)
            example:
              is_hidden: true
              reason: Copyright violation reported and confirmed.

      responses:
        "200":
          description: Track visibility updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      track_id:
                        type: string
                        format: uuid
                      is_hidden:
                        type: boolean
                  message:
                    type: string
                    example: Track hidden successfully
              example:
                data:
                  track_id: a1234567-89ab-cdef-0123-456789abcdef
                  is_hidden: true
                message: Track hidden successfully

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users/{id}/suspend:
    patch: # [F8] was: post
      tags: [Admin]
      summary: Suspend a user account (admin only)
      description: |
        Suspends a user account, preventing login and all platform activity.
        Cannot be applied to other admin accounts.

        **Required role:** Admin
      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID to suspend

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for suspension (shown to user)
                  example: Repeated copyright violations
                # [F9] duration_days removed — not in reference spec
            example:
              reason: Repeated copyright violations

      responses:
        "200":
          description: Account suspended successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object # [F9] aligned response shape with reference
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        example: suspended
                      reason:
                        type: string
                      suspended_at:
                        type: string
                        format: date-time
                  message:
                    type: string
                    example: Account suspended successfully
              example:
                data:
                  id: u1234567-89ab-cdef-0123-456789abcdef
                  status: suspended
                  reason: Repeated copyright violations
                  suspended_at: "2026-03-05T20:00:00Z"
                message: Account suspended successfully

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "403":
          $ref: "#/components/responses/Forbidden"

        "404":
          $ref: "#/components/responses/NotFound"

        "422":
          description: Cannot suspend admin account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_OPERATION_NOT_ALLOWED
                  message: Cannot suspend another admin account

  /admin/users/{id}/reinstate:
    patch: # [F10] was: post
      tags: [Admin]
