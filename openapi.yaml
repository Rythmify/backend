  /playlists/{playlist_id}/embed:
    get:
      tags: [Playlists]
      summary: Generate playlist embed code
      description: |
        Generates an embeddable iframe snippet for a playlist.

        Access rules:
        - Public playlists: accessible to anyone.
        - Private playlists: require `secret_token` unless the requester is the owner.

        The returned iframe can be used on external websites to embed the playlist player.
      operationId: getPlaylistEmbed
      security: [] # public

      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

        - name: secret_token
          in: query
          required: false
          description: Secret token required for private playlists.
          schema:
            type: string

        - name: theme
          in: query
          required: false
          description: Player theme.
          schema:
            type: string
            enum: [light, dark]
            default: light

        - name: autoplay
          in: query
          required: false
          description: Whether the embedded player should autoplay.
          schema:
            type: boolean
            default: false

        - name: width
          in: query
          required: false
          description: Width of the iframe player.
          schema:
            type: integer
            minimum: 200
            maximum: 1200
            default: 600

        - name: height
          in: query
          required: false
          description: Height of the iframe player.
          schema:
            type: integer
            minimum: 100
            maximum: 600
            default: 200

      responses:
        '200':
          description: Embed code generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistEmbedResponse'
              example:
                data:
                  embed_url: https://api.rythmify.com/embed/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  iframe_html: "<iframe src='https://api.rythmify.com/embed/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa' width='600' height='200' frameborder='0'></iframe>"
                message: Playlist embed code generated successfully.

        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        '403':
          description: Playlist is private and no valid secret token was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PLAYLIST_ACCESS_DENIED
                  message: Private playlist requires a valid secret token.

        '429':
          $ref: '#/components/responses/RateLimited'

  # ==========================================================
  # Module 7.5 — Home & Discovery + Genre Discovery
  # ==========================================================

  /home:
    get:
      tags: [Home & Discovery]
      summary: Get full home page
      operationId: getHome
      description: |
        Returns all home page sections in one response.
        All sub-queries run in parallel on the server.

        Sections returned:
        - `curated` — guest discovery mix previews (multi-genre, preview-only)
        - `hot_for_you` — one featured track of the day
        - `trending_by_genre` — genre tab bar + first tab pre-loaded
        - `more_of_what_you_like` — tracks from liked genres and followed artists (null for guests)
        - `albums_for_you` — album recommendations with first-track preview (null for guests)
        - `mixed_for_you` — up to 6 auto-generated genre mixes (null for guests)
        - `made_for_you` — Daily Drops + Weekly Wave summaries (null for guests)
        - `artists_to_watch` — emerging artists by play velocity
        - `discover_with_stations` — artist-based radio stations

        Cross-section deduplication is applied server-side.
        Priority: hot_for_you → trending → more_of_what_you_like → mixed_for_you.
        Empty sections return `[]`, never `null`.
        Unauthenticated users receive global discovery sections and curated mix previews.
        `more_of_what_you_like`, `albums_for_you`, `mixed_for_you`, and `made_for_you` are null for guests.

        Curated mixes are generated dynamically from top-performing genres,
        combined into multi-genre previews, filtered for artist diversity,
        and include controlled randomness.

        Curated mixes are cached and refreshed periodically, so results can vary over time.
        Curated preview mix IDs (`mix_custom_<genreId1>_<genreId2>`) are frontend discovery IDs.
        They are not directly tied to the `/home/mixes/{mixId}` endpoint.
      security: []
      responses:
        '200':
          description: Home page data returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

