      description: |
        Syncs offline/backfilled listening history and the latest reconnect player state
        for the authenticated user.

        History events reuse the existing listening-history dedupe rules.
        The incoming `current_state` only overwrites stored player state when
        `state_updated_at` is newer than the currently saved state.
        Requests accept legacy queue track UUID-formatted strings and rich queue-item objects.
        Responses always return normalized queue-item objects.
      tags: [Playback]
      summary: Sync offline playback history and current state
      operationId: syncPlayback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaybackSyncRequest'
            example:
              history_events:
                - track_id: 39c7c3c3-7d02-4ac1-a647-a2fa0401de02
                  played_at: '2026-04-18T19:45:00Z'
                  duration_played_seconds: 100
              current_state:
                track_id: 63f8f162-b255-4525-bf71-9913541cbbc5
                position_seconds: 1473.8
                volume: 0.49
                queue:
                  - track_id: 39c7c3c3-7d02-4ac1-a647-a2fa0401de02
