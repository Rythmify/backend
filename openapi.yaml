        '200':
          description: Already liked — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Album liked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumLikeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the authenticated user's like from the specified album.
      tags: [Likes]
      summary: Unlike an album
      operationId: unlikeAlbum
      parameters:
        - name: album_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Unliked — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /albums/{album_id}/likers:
    get:
      description: Returns a paginated list of users who liked the specified album.
      tags: [Likes]
      summary: List users who liked an album
      operationId: getAlbumLikers
      parameters:
        - name: album_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
