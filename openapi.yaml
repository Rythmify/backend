  # ==========================================================
  # Module 3 — Comments & Track Comments (Waveform Flyovers)
  # ==========================================================
  # For floating comments displayed during playback (waveform flyovers):
  # The frontend monitors the current playback position and displays comments
  # whose track_timestamp is close to that position. Use the new query
  # parameters (timestamp_from, timestamp_to, sort=timestamp) to load comments
  # for a specific waveform section efficiently instead of fetching all comments.
  #
  # CRITICAL DATABASE REQUIREMENTS:
  # 1. ALTER TABLE comments ADD COLUMN updated_at TIMESTAMPTZ;
  #    — Required for PATCH (edit) endpoint to track last modification.
  #
  # 2. ALTER TABLE comments ADD COLUMN reply_count INTEGER DEFAULT 0;
  #    — Denormalized counter (must be kept up-to-date via triggers or app logic).
  #      Avoids O(n) COUNT subqueries during pagination with thousands of comments.
  #      Increment on POST /comments/{comment_id}/replies
  #      Decrement on DELETE reply
  #
  # 3. CREATE INDEX ON comments (track_id, "timestamp");
  #    — Essential for fast waveform timestamp filtering/sorting.
  #      Queries with sort=timestamp or timestamp_from/timestamp_to will be sequential scans without it.
  #
  # 4. Foreign key: parent_comment_id REFERENCES comments(id) ON DELETE CASCADE
  #    — Required for cascade-delete behavior (DELETE comment deletes all nested replies).
  #      Alternative: implement cascade logic explicitly in DELETE endpoint handler.
  # ==========================================================

  /tracks/{track_id}/comments:
    get:
      description: |
        Returns paginated top-level comments for the specified track.

        Supports optional filtering by timestamp range and sorting strategies:
        - `timestamp_from` + `timestamp_to` — Filter comments to a specific waveform time window (in seconds).
        - `sort` — Change the sort order:
          - `newest` — Most recent comments first, then by id (default for browsing)
            SQL: ORDER BY created_at DESC, id DESC
          - `oldest` — Oldest comments first, then by id
            SQL: ORDER BY created_at ASC, id ASC
          - `timestamp` — Ordered by track_timestamp, then created_at, then id (deterministic, useful for waveform flyovers)
            SQL: ORDER BY track_timestamp ASC, created_at ASC, id ASC
          - `top` — Most-liked comments first, then by track_timestamp, then by created_at (ideal for highlights view)
            SQL: ORDER BY like_count DESC, track_timestamp ASC, created_at ASC, id ASC

        **Deterministic sorting:** Pagination is applied after filtering. Ties are ALWAYS broken by created_at (microsecond precision) and then id (UUID), ensuring:
        - Identical query results across multiple requests
        - No comment jumping or reordering
        - Stable pagination (no duplicates or skips)
      tags: [Comments]
      summary: List top-level comments on a track
      operationId: getTrackComments
      parameters:
        - $ref: '#/components/parameters/TrackId'
        - name: timestamp_from
          in: query
          required: false
          description: Show only comments at or after this timestamp (in seconds). Useful for waveform flyovers.
          schema: { type: integer, minimum: 0 }
        - name: timestamp_to
          in: query
          required: false
          description: Show only comments before or at this timestamp (in seconds). Useful for waveform flyovers.
          schema: { type: integer, minimum: 0 }
        - name: sort
          in: query
          required: false
          description: Sort order for comments.
          schema:
            type: string
            enum: [newest, oldest, timestamp, top]
            default: newest
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Paginated top-level comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      description: Posts a new timestamped comment on the specified track.
      tags: [Comments]
      summary: Post a comment on a track
      operationId: createComment
      parameters:
        - $ref: '#/components/parameters/TrackId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentCreatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

