  # ==========================================================
  # Module 12 — Premium Subscription & Payments
  # ==========================================================

  /subscriptions/plans:
    get:
      tags: [Subscription]
      summary: List available subscription plans
      description: |
        Returns the available subscription plans for the platform.

        This endpoint is public so clients can display plan comparison before authentication.

        Notes:
        - Free plan allows up to 3 track uploads and 2 playlists.
        - Premium plan allows unlimited uploads and unlimited playlists.
        - Offline listening is a mocked premium-only capability.
      operationId: listSubscriptionPlans
      security: []

      responses:
        "200":
          description: Subscription plans fetched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlanListResponse"
              example:
                data:
                  items:
                    - subscription_plan_id: 1
                      name: free
                      price: "0.00"
                      duration_days: null
                      track_limit: 3
                      playlist_limit: 2
                    - subscription_plan_id: 2
                      name: premium
                      price: "4.99"
                      duration_days: 30
                      track_limit: null
                      playlist_limit: null
                message: Subscription plans fetched successfully.

        "429":
          $ref: "#/components/responses/RateLimited"

  /subscriptions/me:
    get:
      tags: [Subscription]
      summary: Get current user subscription
      description: |
        Returns the authenticated user's current subscription details.

        Notes:
        - If the user has an active subscription record, it is returned together with the linked plan.
        - If the user does not have an active paid subscription, the response should still reflect
          the effective free plan for limit enforcement.
        - This endpoint is used by clients to determine the user's current plan, limits,
          renewal behavior, and premium access state.
      operationId: getMySubscription
      responses:
        "200":
          description: Current subscription fetched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySubscriptionResponse"
              example:
                data:
                  user_subscription_id: 15
                  user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  status: active
                  start_date: "2026-03-01"
                  end_date: "2026-03-31"
                  auto_renew: true
                  created_at: "2026-03-01T09:30:00Z"
                  plan:
                    subscription_plan_id: 2
                    name: premium
                    price: "4.99"
                    duration_days: 30
                    track_limit: null
                    playlist_limit: null
                message: Current subscription fetched successfully.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "429":
          $ref: "#/components/responses/RateLimited"

  /subscriptions/checkout:
    post:
      tags: [Subscription]
      summary: Start subscription checkout
      description: |
        Starts a mocked Stripe Test Mode checkout flow for upgrading the authenticated user
        to the premium plan.

        Notes:
        - This endpoint is authenticated and uses the current user from the bearer token.
        - Only paid plans should be accepted here.
        - Payment processing is mocked for the course project.
        - On success, the backend creates a pending user subscription record and a pending transaction, then returns checkout details.
      operationId: createSubscriptionCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionCheckoutRequest"

      responses:
        "200":
          description: Checkout session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionCheckoutResponse"
              example:
                data:
                  transaction_id: 27
                  user_subscription_id: 18
                  checkout_status: pending
                  payment_method: mock
                  payment_url: "https://checkout.stripe.com/pay/mock-session-123"
                  plan:
                    subscription_plan_id: 2
                    name: premium
                    price: "4.99"
                    duration_days: 30
                    track_limit: null
                    playlist_limit: null
                message: Checkout session created successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "409":
          description: User already has an active premium subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SUBSCRIPTION_ALREADY_ACTIVE
                  message: You already have an active premium subscription.

        "422":
          description: Business rule violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: BUSINESS_RULE_VIOLATION
                  message: Selected plan is not eligible for checkout.

        "429":
          $ref: "#/components/responses/RateLimited"

  /subscriptions/cancel:
    post:
      tags: [Subscription]
      summary: Cancel current subscription
      description: |
        Cancels the authenticated user's current premium subscription.

        Notes:
        - This endpoint is authenticated and uses the current user from the bearer token.
        - Cancellation disables auto-renew for the active subscription.
        - Premium access may continue until the current subscription end date.
        - If the user is already on the free plan or has no active premium subscription, the request is rejected.
      operationId: cancelMySubscription
      responses:
        "200":
          description: Subscription canceled successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSubscriptionResponse"
              example:
                data:
                  user_subscription_id: 18
                  status: canceled
                  auto_renew: false
                  end_date: "2026-03-31"
                message: Subscription canceled successfully.

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          description: No active premium subscription found for the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SUBSCRIPTION_NOT_FOUND
                  message: No active premium subscription found.

        "409":
          description: Subscription is already canceled or not eligible for cancellation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SUBSCRIPTION_ALREADY_CANCELED
                  message: Subscription is already canceled.

        "429":
          $ref: "#/components/responses/RateLimited"

  /subscriptions/transactions:
    get:
      tags: [Subscription]
      summary: List subscription transactions
      description: |
        Returns the authenticated user's subscription transaction history.

        Notes:
        - This endpoint is authenticated and uses the current user from the bearer token.
        - Transactions are returned in reverse chronological order by default.
        - This endpoint is useful for showing mocked Stripe/payment history in the client.
      operationId: listMySubscriptionTransactions
      parameters:
        - name: limit
          in: query
          required: false
          description: Page size.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20

        - name: offset
          in: query
          required: false
          description: Pagination offset.
          schema:
            type: integer
            minimum: 0
            default: 0

        - name: payment_status
          in: query
          required: false
          description: Filter transactions by payment status.
          schema:
            $ref: "#/components/schemas/PaymentStatus"

      responses:
        "200":
          description: Subscription transactions fetched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionTransactionListResponse"
              example:
                data:
                  items:
                    - transaction_id: 27
                      user_subscription_id: 18
                      amount: "4.99"
                      payment_method: mock
                      payment_status: paid
                      paid_at: "2026-03-01T09:35:00Z"
                      created_at: "2026-03-01T09:30:00Z"
                    - transaction_id: 19
                      user_subscription_id: 12
                      amount: "4.99"
                      payment_method: mock
                      payment_status: failed
                      paid_at: null
                      created_at: "2026-02-01T08:10:00Z"
                  meta:
                    limit: 20
                    offset: 0
                    total: 2
                message: Subscription transactions fetched successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "429":
          $ref: "#/components/responses/RateLimited"

  /subscriptions/mock-confirm/{transaction_id}:
    post:
      tags: [Subscription]
      summary: Confirm mocked subscription payment
      description: |
        Simulates a successful Stripe payment confirmation for a pending subscription transaction.

        Notes:
        - This endpoint is used only for the mocked payment flow in the course project.
        - The frontend calls this endpoint after the user confirms payment on the mock Stripe page.
        - On success, the backend marks the transaction as paid and activates the linked subscription.
      operationId: confirmMockSubscriptionPayment
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Transaction ID to confirm.
          schema:
            type: integer

      responses:
        "200":
          description: Mock payment confirmed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockConfirmSubscriptionResponse"
              example:
                data:
                  transaction_id: 27
                  payment_status: paid
                  paid_at: "2026-03-06T14:20:00Z"
                  subscription:
                    user_subscription_id: 18
                    status: active
                    auto_renew: true
                    start_date: "2026-03-06"
                    end_date: "2026-04-05"
                message: Mock payment confirmed and subscription activated successfully.

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/Unauthorized"

        "404":
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: TRANSACTION_NOT_FOUND
                  message: Transaction not found.

        "409":
          description: Transaction is not eligible for confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alreadyPaid:
                  value:
                    error:
                      code: TRANSACTION_ALREADY_PAID
                      message: Transaction has already been confirmed.
                notPending:
                  value:
                    error:
                      code: TRANSACTION_NOT_PENDING
                      message: Only pending transactions can be confirmed.

        "429":
          $ref: "#/components/responses/RateLimited"

  # ==========================================================

  # ==========================================================
  # Module 3 — Followers & Social Graph
  # ==========================================================

  /users/{user_id}/follow:
    post:
      tags:
        - Follow
      summary: Follow a user
      operationId: followUser
