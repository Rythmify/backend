          description: |
            First track of the playlist for instant playback from Home screen.
            null if playlist is empty.

    PlaylistDetails:
      allOf:
        - $ref: '#/components/schemas/Playlist'
        - type: object
          properties:
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistTrackItem'

    PlaylistResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Playlist'
        message:
          type: string

    PlaylistGetResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PlaylistDetails'
        message:
          type: string

    PlaylistTracksGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [playlist_id, tracks, pagination]
          properties:
            playlist_id:
              type: string
              format: uuid
            tracks:
              type: array
              items:
                type: object
                required: [track_id, position, added_at]
                properties:
                  track_id:
                    type: string
                    format: uuid
                  position:
                    type: integer
                    minimum: 1
                  added_at:
                    type: string
                    format: date-time
                  title:
                    type: string
                  duration:
                    type: integer
                    nullable: true
                  cover_image:
                    type: string
                    format: uri
                    nullable: true
                  is_public:
                    type: boolean
                  deleted_at:
                    type: string
                    format: date-time
                    nullable: true
                  artist_name:
                    type: string
                    nullable: true
                  artist_id:
                    type: string
                    format: uuid
            pagination:
              type: object
              required: [page, per_page, total_items, total_pages, has_next, has_prev]
              properties:
                page:
                  type: integer
                  minimum: 1
                per_page:
                  type: integer
                  minimum: 1
                total_items:
                  type: integer
                  minimum: 0
                total_pages:
                  type: integer
                  minimum: 0
                has_next:
                  type: boolean
                has_prev:
                  type: boolean
        message:
          type: string

    PlaylistListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, meta]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Playlist'
            meta:
              $ref: '#/components/schemas/ListMeta'
        message:
          type: string

    UpdatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        is_public:
          type: boolean
      additionalProperties: false

    AddTrackToPlaylistRequest:
      type: object
      required: [track_id]
      properties:
        track_id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
          nullable: true
      additionalProperties: false

    ReorderPlaylistTracksRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [track_id, position]
            properties:
              track_id:
                type: string
                format: uuid
              position:
                type: integer
                minimum: 1

    PlaylistEmbedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [embed_url, iframe_html]
          properties:
            embed_url:
              type: string
              format: uri
            iframe_html:
              type: string
        message:
          type: string

    PlaylistSummary:
      type: object
      description: Minimal playlist info for search results.
      required: [id, title, owner]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        owner:
          $ref: '#/components/schemas/PlaylistOwnerSummary'
        track_count:
          type: integer
        created_at:
          type: string
          format: date-time

    # ── Discovery track model (lightweight, used across all discovery) ──
    # [FIX-8] Added repost_count
    DiscoveryTrack:
      type: object
      description: |
        Lightweight track object used across all discovery, feed, and search endpoints.
        artist_name is denormalised to avoid per-item user lookups.
        Use this schema (not Track or FeedTrack) anywhere a compact track is needed.
      required: [id, title, user_id, play_count]
      properties:
        id:
          type: string
          format: uuid
          example: e5f6a7b8-c9d0-1234-efab-567890abcdef
        title:
          type: string
          example: Summer Vibes
        cover_image:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/covers/track1.jpg
        duration:
          type: integer
          nullable: true
          description: Duration in seconds.
          example: 213
        genre_name:
          type: string
          nullable: true
          example: Electronic
        play_count:
          type: integer
          example: 4200
        like_count:
          type: integer
          example: 312
        # [FIX-8] Added
        repost_count:
          type: integer
          nullable: true
          example: 47
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        artist_name:
          type: string
          nullable: true
          description: Denormalised display_name of the track owner.
          example: DJ Karim
        stream_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/tracks/e5f6a7b8/stream.mp3
        created_at:
          type: string
          format: date-time
          example: '2026-03-01T10:00:00Z'

    # [FIX-1][FIX-3][FIX-14] Unified feed item schema replacing FeedTrack in feed endpoints.
    # FeedTrack is kept below for search/trending use but aligned to DiscoveryTrack field names.
    FeedItem:
      type: object
      description: |
        A single item in the Following or Discover feed.
        item_type distinguishes original posts from reposts.
        When item_type = "repost", repost_by is the user who reposted it.
      required: [item_type, track]
      properties:
        item_type:
          type: string
          enum: [track, repost]
          description: |
            track — original upload by a followed user.
            repost — a track reposted by a followed user.
          example: repost
        repost_by:
          nullable: true
          description: |
            The user who performed the repost. Present only when item_type = "repost".
            null when item_type = "track".
          allOf:
            - $ref: '#/components/schemas/RepostByUser'
        reposted_at:
          type: string
          format: date-time
          nullable: true
          description: When the repost occurred. Present only when item_type = "repost".
          example: '2026-04-03T09:15:00Z'
        track:
          $ref: '#/components/schemas/DiscoveryTrack'

    RepostByUser:
      type: object
      description: Minimal user info for the user who performed a repost.
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        display_name:
          type: string
          example: Ahmed Sami
        username:
          type: string
          nullable: true
          example: ahmed_sami
        profile_picture:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/avatars/ahmed.jpg

    FeedResponse:
      type: object
      description: Response for GET /feed and GET /feed/discover.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedItem'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    # [FIX-14] FeedTrack aligned with DiscoveryTrack field names (cover_image, flat artist_name)
    # Still used by /feed/trending and /search
    FeedTrack:
      type: object
      description: |
        Track with artist summary. Used in trending feed and search results.
        Field names are aligned with DiscoveryTrack (cover_image, artist_name).
      required: [id, title, artist_name, user_id]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        # [FIX-14] Was cover_url — now cover_image (aligned with DiscoveryTrack)
        cover_image:
          type: string
          format: uri
          nullable: true
        # [FIX-14] Was artist.display_name nested object — now flat artist_name string
        artist_name:
          type: string
          nullable: true
          description: Denormalised display_name of the track owner.
        user_id:
          type: string
          format: uuid
        genre_name:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
        play_count:
          type: integer
        like_count:
          type: integer
        repost_count:
          type: integer
          nullable: true
        stream_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time

    TrendingTrack:
      allOf:
        - $ref: '#/components/schemas/FeedTrack'
        - type: object
          properties:
            rank:
              type: integer
              description: Position in trending chart (1-based).
              example: 1
            trend_score:
              type: number
              format: float
              description: Normalised trending score (0–1).
              example: 0.94

    TrendingFeedResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrendingTrack'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    # [FIX-6][FIX-7] Search response — pagination inside data, per-type meta
    SearchResponse:
      type: object
      required: [data, pagination]
      description: |
        Paginated search results. When type param is provided, only that
        resource type is populated. Use type param + independent limit/offset
        per type for tab-level pagination.
      properties:
        data:
          type: object
          required: [tracks, users, playlists]
          properties:
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/TrackSearchResult'
            users:
              type: array
              items:
                $ref: '#/components/schemas/UserSearchResult'
            playlists:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistSearchResult'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    TrackSearchResult:
      allOf:
        - $ref: '#/components/schemas/FeedTrack'
        - type: object
          properties:
            score:
              type: number
              format: float
              example: 0.92

    UserSearchResult:
      type: object
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        profile_picture:
          type: string
          format: uri
          nullable: true
        follower_count:
          type: integer
        score:
          type: number
          format: float
          example: 0.75

    PlaylistSearchResult:
      allOf:
        - $ref: '#/components/schemas/PlaylistSummary'
        - type: object
          properties:
            score:
              type: number
              format: float
              example: 0.81

    ResolveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, id, permalink]
          properties:
            type:
              type: string
              enum: [track, user, playlist]
            id:
              type: string
              format: uuid
            permalink:
              type: string
              format: uri

    # ── Discovery & Genre schemas ─────────────────────────────
    DiscoveryMix:
      type: object
      required: [id, label, flavor, track_count, generated_at]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: MIX 1
        # [FIX-12] Removed unused taste_profile value
        flavor:
          type: string
          enum: [listening_history]
          example: listening_history
        genre_name:
          type: string
          nullable: true
        cover_image:
          type: string
          format: uri
          nullable: true
        track_count:
          type: integer
        generated_at:
          type: string
          format: date-time
        preview_track:
          allOf:
            - $ref: '#/components/schemas/DiscoveryTrack'
          nullable: true
          description: |
            First track of this mix for instant playback from Home screen.
            null if mix has no tracks.

    DiscoveryStation:
      type: object
      required: [id, name, artist_id, artist_name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Based on DJ Karim
        artist_id:
          type: string
          format: uuid
        artist_name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        track_count:
          type: integer
        follower_count:
          type: integer

    DiscoveryAlbum:
      type: object
      required: [id, name, owner_id, owner_name, track_count, like_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        track_count:
          type: integer
        like_count:
          type: integer
        created_at:
          type: string
          format: date-time

    CuratedMixSummary:
      type: object
      required: [id, label, description, track_count, refreshes_at]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: Daily Drops
        description:
          type: string
        track_count:
          type: integer
        refreshes_at:
          type: string
          format: date-time
        preview_track:
          allOf:
            - $ref: '#/components/schemas/DiscoveryTrack'
          nullable: true

    EmergingArtist:
      type: object
      required: [id, display_name, play_velocity]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        profile_picture:
          type: string
          format: uri
          nullable: true
        top_genre:
          type: string
          nullable: true
        play_velocity:
          type: integer
        track_count:
          type: integer

    # [FIX-15] Added is_following to SuggestedUser
    SuggestedUser:
      type: object
      required: [id, display_name, is_verified, follower_count, suggestion_source, is_following]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean
        follower_count:
          type: integer
        mutual_count:
          type: integer
          nullable: true
          description: Number of mutual follows. Present only when suggestion_source = "mutual".
        suggestion_source:
          type: string
          enum: [mutual, popular]
        # [FIX-15]
        is_following:
          type: boolean
          description: |
            Whether the authenticated user already follows this person.
            Always false for suggestions by definition, but included for
            consistency when this schema is reused in other contexts.
          example: false

    # [FIX-15] Added is_following to SuggestedArtist
    SuggestedArtist:
      type: object
      required: [id, display_name, is_verified, follower_count, is_following]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean
        follower_count:
          type: integer
        top_genre:
          type: string
          nullable: true
        # [FIX-15]
        is_following:
          type: boolean
          description: Whether the authenticated user already follows this artist.
          example: false

    GenreDetail:
      type: object
      required: [id, name, track_count, artist_count, playlist_count, album_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        track_count:
          type: integer
        artist_count:
          type: integer
        playlist_count:
          type: integer
        album_count:
          type: integer

    GenreArtist:
      type: object
      required: [id, display_name, is_verified, follower_count, track_count_in_genre]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean
        follower_count:
          type: integer
        track_count_in_genre:
          type: integer

    GenrePlaylist:
      type: object
      required: [id, name, owner_id, owner_name, track_count, like_count, source]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        track_count:
          type: integer
        like_count:
          type: integer
        source:
          type: string
          enum: [tagged, inferred]
        created_at:
          type: string
          format: date-time

    GenreAlbum:
      type: object
      required: [id, name, owner_id, owner_name, track_count, like_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        track_count:
          type: integer
        like_count:
          type: integer
        release_date:
          type: string
          format: date
          nullable: true

    # [FIX-5] made_for_you is nullable for unauthenticated users
    # [FIX-9] genre_id is required (not nullable) in trending_by_genre
    HomeResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required:
            - hot_for_you
            - trending_by_genre
            - more_of_what_you_like
            - mixed_for_you
            - artists_to_watch
            - discover_with_stations
          properties:
            hot_for_you:
              type: object
              required: [track, valid_until]
              properties:
                track:
                  $ref: '#/components/schemas/DiscoveryTrack'
                reason:
                  type: string
                  nullable: true
                  description: |
                    "Trending in {genre_name}" — unplayed track in user's top genre.
                    "global trending" — authenticated, no genre match.
                    null — unauthenticated user.
                valid_until:
                  type: string
                  format: date-time
            trending_by_genre:
              type: object
              required: [genres, initial_tab]
              properties:
                genres:
                  type: array
                  items:
                    type: object
                    # [FIX-9] genre_id is required, not nullable
                    required: [genre_id, genre_name]
                    properties:
                      genre_id:
                        type: string
                        format: uuid
                      genre_name:
                        type: string
                initial_tab:
                  type: object
                  required: [genre_id, genre_name, tracks]
                  properties:
                    genre_id:
                      type: string
                      format: uuid
                    genre_name:
                      type: string
                    tracks:
                      type: array
                      items:
                        $ref: '#/components/schemas/DiscoveryTrack'
            more_of_what_you_like:
              type: object
              required: [tracks, source]
              properties:
                tracks:
                  type: array
                  items:
                    $ref: '#/components/schemas/DiscoveryTrack'
                source:
                  type: string
                  enum: [personalized, trending_fallback]
            mixed_for_you:
              type: array
              maxItems: 6
              items:
                $ref: '#/components/schemas/DiscoveryMix'
            # [FIX-5] made_for_you is nullable — null for unauthenticated users
            made_for_you:
              nullable: true
              description: |
                null for unauthenticated users (requires auth to generate).
                When null, the FE should hide the Made For You section.
                When source = "trending_fallback", display generic labels.
              allOf:
                - type: object
                  required: [daily_mix, weekly_mix]
                  properties:
                    daily_mix:
                      $ref: '#/components/schemas/CuratedMixSummary'
                    weekly_mix:
                      $ref: '#/components/schemas/CuratedMixSummary'
            artists_to_watch:
              type: array
              maxItems: 10
              items:
                $ref: '#/components/schemas/EmergingArtist'
            discover_with_stations:
              type: array
              maxItems: 10
              items:
                $ref: '#/components/schemas/DiscoveryStation'
        message:
          type: string
          example: Home page data fetched successfully.

    TrendingByGenreTabResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [genre_id, genre_name, tracks]
          properties:
            genre_id:
              type: string
              format: uuid
            genre_name:
              type: string
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/DiscoveryTrack'
        message:
          type: string

    HotForYouResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [track, valid_until]
          properties:
            track:
              $ref: '#/components/schemas/DiscoveryTrack'
            reason:
              type: string
              nullable: true
            valid_until:
              type: string
              format: date-time
        message:
          type: string

    MoreOfWhatYouLikeResponse:
      type: object
      required: [data, source, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryTrack'
        source:
          type: string
          enum: [personalized, trending_fallback]
        pagination:
          $ref: '#/components/schemas/ListMeta'

    MixedForYouResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [items, source]
          properties:
            items:
              type: array
              maxItems: 6
              items:
                $ref: '#/components/schemas/DiscoveryMix'
            source:
              type: string
              enum: [personalized, trending_fallback]
        message:
          type: string

    MadeForYouResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [daily_mix, weekly_mix]
          properties:
            daily_mix:
              $ref: '#/components/schemas/CuratedMixSummary'
            weekly_mix:
              $ref: '#/components/schemas/CuratedMixSummary'
        message:
          type: string

    StationListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryStation'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    StationTracksResponse:
      type: object
      required: [data, station, pagination]
      properties:
        station:
          $ref: '#/components/schemas/DiscoveryStation'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryTrack'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    AlbumsForYouResponse:
      type: object
      required: [data, source, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryAlbum'
        source:
          type: string
          enum: [followed_artists, popular]
        pagination:
          $ref: '#/components/schemas/ListMeta'

    ArtistsToWatchResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmergingArtist'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    SuggestedUsersResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedUser'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    SuggestedArtistsResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedArtist'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    RelatedTracksResponse:
      type: object
