                    - track_id: 99999999-aaaa-bbbb-cccc-dddddddddddd
                      position: 3
                      added_at: '2026-03-06T10:03:00Z'
                message: Track added to playlist successfully.

        '400':
          $ref: '#/components/responses/ValidationError'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          description: Only the playlist owner can modify this playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PLAYLIST_FORBIDDEN
                  message: You are not allowed to modify this playlist.

        '404':
          description: Playlist or track not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
