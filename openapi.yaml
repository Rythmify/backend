      tags: [Tracks]
      summary: Get recently played tracks (deduplicated)
      operationId: getRecentlyPlayed
      responses:
        '200':
          description: Recently played tracks returned (max 20, deduplicated).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentlyPlayedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      description: Permanently deletes all listening history for the authenticated user.
      tags: [Tracks]
      summary: Clear listening history
      operationId: clearListeningHistory
      responses:
        '204':
          description: Listening history cleared. No response body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/listening-history:
    get:
      description: Returns the complete play-by-play listening history, paginated.
      tags: [Tracks]
      summary: Full paginated listening history
      operationId: getListeningHistory
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Paginated listening history returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListeningHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    # [FIX-4] Added — write endpoint for listening history (critical for mobile personalization)
    post:
      tags: [Tracks]
      summary: Write a listening history entry
      description: |
        Records a play event to the authenticated user's listening history.
        Used by the mobile app and for background/offline playback sync where
        `POST /tracks/{id}/play` cannot be called directly.

        The backend deduplicates plays within a 30-second window per track to
        prevent double-counting from network retries.
      operationId: writeListeningHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteListeningHistoryRequest'
      responses:
        '201':
          description: Listening history entry recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                data:
                  success: true
                message: Listening history entry recorded.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Track not found or not accessible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  # ==========================================================
  # Module 7 — Sets & Playlists
  # ==========================================================

  /playlists:
    post:
      tags: [Playlists]
      summary: Create a playlist
      description: |
        Creates a new playlist (set) for the authenticated user.

        Notes:
        - If `is_public=false`, the playlist is treated as "secret/private" (shareable by token/link).
        - Playlist count limits may apply depending on the user's subscription plan.
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistRequest'

      responses:
        '201':
          description: Playlist created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistResponse'
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: 'Gym Mix'
                  slug: 'gym-mix'
                  description: 'High energy tracks'
                  is_public: true
                  cover_image: 'https://cdn.rythmify.com/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa/cover.jpg'
                  subtype: 'playlist'
                  release_date: '2026-03-06'
                  genre_id: 6c6d6f9f-2e4a-4c0e-84e6-1738a29edb8d
                  track_count: 0
                  like_count: 0
                  repost_count: 0
                  created_at: '2026-03-06T10:00:00Z'
                  updated_at: '2026-03-06T10:00:00Z'
                message: 'Playlist created successfully.'

        '400':
          $ref: '#/components/responses/ValidationError'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '422':
          description: Business rule violation (e.g., playlist limit reached).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BUSINESS_LIMIT_REACHED
                  message: Playlist limit reached for your current plan.

        '429':
          $ref: '#/components/responses/RateLimited'

    get:
      tags: [Playlists]
      summary: List playlists
      description: |
        Returns a paginated list of playlists.

        By default, this returns **public** playlists.

        To list the authenticated user's library, set `mine=true` and include Bearer auth.

        Filters:
        - `filter=created|liked` applies only when `mine=true`.
        - `is_album_view=true` returns non-regular playlists (all subtypes except `playlist`).
        - `subtype` filters by one subtype when `is_album_view` is not used.
      operationId: listPlaylists
      security: [] # public by default; auth required only when mine=true

      parameters:
        - name: mine
          in: query
          required: false
          description: If true, returns the authenticated user's playlists (public + private).
          schema:
            type: boolean
            default: false

        - name: filter
          in: query
          required: false
          description: Library filter for authenticated requests (`mine=true`). Defaults to `created` when omitted.
          schema:
            type: string
            enum: [created, liked]
            default: created

        - name: q
          in: query
          required: false
          description: Search by playlist name (simple contains match).
          schema:
            type: string
            maxLength: 100

        - name: subtype
          in: query
          required: false
