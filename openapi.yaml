# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token from /auth/login, /auth/verify-email, or OAuth endpoints.
        Expires in 15 minutes. Use /auth/refresh to renew.

  # ----------------------------------------------------------
  # Parameters
  # ----------------------------------------------------------
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string, format: uuid }

    TrackId:
      name: track_id
      in: path
      required: true
      schema: { type: string, format: uuid }

    QueueItemId:
      name: queue_item_id
      in: path
      required: true
      schema: { type: string, format: uuid }

    CommentId:
      name: comment_id
      in: path
      required: true
      schema: { type: string, format: uuid }

    PlaylistId:
      name: playlist_id
      in: path
      required: true
      schema: { type: string, format: uuid }

    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }

  # ----------------------------------------------------------
  # Responses
  # ----------------------------------------------------------
  responses:
    ValidationError:
      description: Validation / bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_FAILED
              message: Validation failed
              details:
                - field: email
                  issue: Invalid email format

    Unauthorized:
      description: Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: AUTH_TOKEN_MISSING
              message: Authorization header missing

    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: PERMISSION_DENIED
              message: You do not have permission to perform this action.

    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: Resource not found.

    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: An unexpected error occurred

    TrackProcessingFailed:
      description: Track transcoding failed — cannot be played.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_PROCESSING_FAILED
              message: Track processing failed

    FileTooLarge:
      description: Uploaded file exceeds the maximum allowed size.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_FILE_TOO_LARGE
              message: File size exceeds the allowed limit

    UnsupportedMediaType:
      description: Uploaded file format not supported.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UPLOAD_INVALID_FILE_TYPE
              message: Unsupported file format

    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many requests

    UnprocessableEntity:
      description: Business rule validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: BUSINESS_RULE_VIOLATION
              message: CAPTCHA validation failed

  # ----------------------------------------------------------
  # Schemas
  # ----------------------------------------------------------
  schemas:
    # ── Shared error envelope ─────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'

    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
          example: Validation failed
        details:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      required: [field, issue]
      properties:
        field:
          type: string
          example: email
        issue:
          type: string
          example: Invalid email format

    SuccessMessage:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success:
              type: boolean
              example: true
        message:
          type: string
          example: Operation completed successfully.

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed.

    # ── Pagination — unified ListMeta (offset-based) ──────────
    # [FIX-6] Removed page-based Pagination schema.
    # All endpoints now use ListMeta.
    ListMeta:
      type: object
      description: Unified pagination envelope used by all list endpoints.
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        total:
          type: integer
          description: Total matching records before pagination.
          example: 340

    # ── Shared user types ─────────────────────────────────────
    UserRole:
      type: string
      enum: [artist, listener, admin]

    GenderType:
      type: string
      enum: [male, female]

    UserSummary:
      type: object
      description: Minimal user info for list and feed responses.
      required: [user_id, email, display_name, role, is_verified]
      properties:
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        email:
          type: string
          format: email
          example: user@example.com
        display_name:
          type: string
          example: cairokee
        gender:
          allOf:
            - $ref: '#/components/schemas/GenderType'
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        is_verified:
          type: boolean
          example: true
        profile_picture:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/avatars/user123.jpg

    PublicUser:
      type: object
      description: Public-facing user profile.
      required:
        [
          id,
          display_name,
          role,
          is_private,
          is_verified,
          followers_count,
          following_count,
          created_at,
        ]

      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        username:
          type: string
          nullable: true
          pattern: '^[a-z0-9_-]+$'
          example: soundwave_cairo
        display_name:
          type: string
          example: Soundwave
        bio:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        gender:
          allOf:
            - $ref: '#/components/schemas/GenderType'
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        profile_picture:
          type: string
          format: uri
          nullable: true
        cover_photo:
          type: string
          format: uri
          nullable: true
        is_private:
          type: boolean
          default: false
        is_verified:
          type: boolean
          default: false
        followers_count:
          type: integer
          default: 0
        following_count:
          type: integer
          default: 0
        created_at:
          type: string
          format: date-time

    PublicUserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PublicUser'

    OwnUser:
      type: object
      description: Full authenticated user profile including all private fields.
      required:
        [
          id,
          email,
          display_name,
          role,
          is_private,
          is_verified,
          followers_count,
          following_count,
          created_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
          nullable: true
        display_name:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        gender:
          allOf:
            - $ref: '#/components/schemas/GenderType'
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        profile_picture:
          type: string
          format: uri
          nullable: true
        cover_photo:
          type: string
          format: uri
          nullable: true
        is_private:
          type: boolean
        date_of_birth:
          type: string
          format: date
          nullable: true
        is_verified:
          type: boolean
        followers_count:
          type: integer
        following_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

    OwnProfileFullResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/OwnUser'
        message:
          type: string

    OwnProfileResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/OwnUser'
        message:
          type: string

    User:
      $ref: '#/components/schemas/OwnUser'

    WebProfile:
      type: object
      required: [id, platform, url]
      properties:
        id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [instagram, twitter, youtube, tiktok, soundcloud, website, other]
        url:
          type: string
          format: uri

    # ── Auth schemas ──────────────────────────────────────────
    AuthRegisterRequest:
      type: object
      required: [email, password, display_name, captcha_token, gender, date_of_birth]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        display_name:
          type: string
          maxLength: 50
        gender:
          $ref: '#/components/schemas/GenderType'
        date_of_birth:
          type: string
          format: date
        captcha_token:
          type: string

    AuthRegisterResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required:
            [user_id, email, display_name, role, is_verified, created_at, gender, date_of_birth]
          properties:
            user_id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            display_name:
              type: string
            gender:
              $ref: '#/components/schemas/GenderType'
            role:
              $ref: '#/components/schemas/UserRole'
            is_verified:
              type: boolean
              example: false
            date_of_birth:
              type: string
              format: date
            created_at:
              type: string
              format: date-time
        message:
          type: string
          example: Account created. Please verify your email.

    AuthVerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AccessTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900

    AuthVerifyEmailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AccessTokenResponse'
        message:
          type: string

    AuthResendVerificationRequest:
      type: object
      required: [email, captcha_token]
      properties:
        email:
          type: string
          format: email
        captcha_token:
          type: string

    AuthLoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Email address OR username.
        password:
          type: string
          format: password

    AuthLoginResponseData:
      type: object
      required: [access_token, token_type, expires_in, user, is_new_user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        user:
          $ref: '#/components/schemas/UserSummary'
        is_new_user:
          type: boolean
          example: false

    AuthLoginResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AuthLoginResponseData'
        message:
          type: string
          example: Logged in successfully.

    AuthRefreshResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AccessTokenResponse'
        message:
          type: string

    AuthForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: If the email exists, a password reset link has been sent.

    AuthResetPasswordRequest:
      type: object
      required: [token, new_password, confirm_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8
        confirm_password:
          type: string
          format: password
          minLength: 8
        logout_all:
          type: boolean
          default: true

    # [FIX-13]
    AuthChangePasswordRequest:
      type: object
      required: [current_password, new_password, confirm_password]
      properties:
        current_password:
          type: string
          format: password
          description: The user's existing password for verification.
        new_password:
          type: string
          format: password
          minLength: 8
          description: The new password to set.
        confirm_password:
          type: string
          format: password
          minLength: 8
          description: Must match new_password exactly.

    AuthChangeEmailRequest:
      type: object
      required: [new_email]
      properties:
        new_email:
          type: string
          format: email

    AuthVerifyEmailChangeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AuthVerifyEmailChangeResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
        message:
          type: string

    AuthGoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string

    AuthGoogleLoginResponseData:
      type: object
      required: [access_token, token_type, expires_in, is_new_user, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        is_new_user:
          type: boolean
        user:
          $ref: '#/components/schemas/UserSummary'

    AuthGoogleLoginResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AuthGoogleLoginResponseData'
        message:
          type: string

    CompleteGoogleOnboardingRequest:
      type: object
      required: [display_name, gender, date_of_birth]
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 50
        gender:
          $ref: '#/components/schemas/GenderType'
        date_of_birth:
          type: string
          format: date
        bio:
          type: string
          nullable: true
          maxLength: 500
        location:
          type: string
          nullable: true
          maxLength: 100
      additionalProperties: false

    CompleteGoogleOnboardingResponse:
      type: object
      required: [data, message]
      properties:
        data:
          type: object
          required: [profile_completed, user]
          properties:
            profile_completed:
              type: boolean
            user:
              $ref: '#/components/schemas/OwnUser'
        message:
          type: string

    # ── User profile schemas ──────────────────────────────────
    UpdateProfileRequest:
      type: object
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 50
        username:
          type: string
          pattern: '^[a-z0-9_-]+$'
          minLength: 3
          maxLength: 30
        first_name:
          type: string
          nullable: true
          maxLength: 50
        last_name:
          type: string
          nullable: true
          maxLength: 50
        bio:
          type: string
          nullable: true
          maxLength: 500
        city:
          type: string
          nullable: true
          maxLength: 100
        country:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
      additionalProperties: false

    UpdateAccountRequest:
      type: object
      properties:
        date_of_birth:
          type: string
          format: date
          nullable: true
        gender:
          $ref: '#/components/schemas/GenderType'
      additionalProperties: false

    SwitchRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [artist, listener]

    AvatarUploadRequest:
      type: object
      required: [avatar]
      properties:
        avatar:
          type: string
          format: binary

    CoverUploadRequest:
      type: object
      required: [cover]
      properties:
        cover:
          type: string
          format: binary

    AvatarUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [profile_picture]
          properties:
            profile_picture:
              type: string
              format: uri
        message:
          type: string

    CoverUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [cover_photo]
          properties:
            cover_photo:
              type: string
              format: uri
        message:
          type: string

    AddWebProfileRequest:
      type: object
      required: [platform, url]
      properties:
        platform:
          type: string
          enum: [instagram, twitter, youtube, tiktok, soundcloud, website, other]
        url:
          type: string
          format: uri

    WebProfileListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebProfile'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    WebProfileCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/WebProfile'
        message:
          type: string

    UpdatePrivacyRequest:
      type: object
      required: [is_private]
      properties:
        is_private:
          type: boolean

    UpdatePrivacyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [is_private]
          properties:
            is_private:
              type: boolean
        message:
          type: string

    ReplaceGenresRequest:
      type: object
      required: [genres]
      properties:
        genres:
          type: array
          maxItems: 10
          items:
            type: string

    GenresResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
        pagination:
          $ref: '#/components/schemas/ListMeta'

    ContentSettings:
      type: object
      properties:
        rss_title:
          type: string
          nullable: true
        rss_language:
          type: string
        rss_category:
          type: string
          nullable: true
        rss_explicit:
          type: boolean
          default: false
        rss_show_email:
          type: boolean
          default: false
        default_include_in_rss:
          type: boolean
          default: true
        default_license_type:
          type: string
          enum: [all_rights_reserved, creative_commons]
          default: all_rights_reserved

    ContentSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ContentSettings'

    UpdateContentSettingsRequest:
      type: object
      properties:
        rss_title:
          type: string
          nullable: true
          maxLength: 200
        rss_language:
          type: string
          nullable: true
        rss_category:
          type: string
          nullable: true
          maxLength: 100
        rss_explicit:
          type: boolean
          nullable: true
        rss_show_email:
          type: boolean
          nullable: true
        default_include_in_rss:
          type: boolean
          nullable: true
        default_license_type:
          type: string
          nullable: true
          enum: [all_rights_reserved, creative_commons]
      additionalProperties: false

    PrivacySettings:
      type: object
      properties:
        is_private:
          type: boolean
          default: false
        receive_messages_from_anyone:
          type: boolean
          default: true
        show_activities_in_discovery:
          type: boolean
          default: true
        show_as_top_fan:
          type: boolean
          default: true
        show_top_fans_on_tracks:
          type: boolean
          default: true

    PrivacySettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PrivacySettings'

    UpdatePrivacySettingsRequest:
      type: object
      properties:
        is_private:
          type: boolean
          nullable: true
        receive_messages_from_anyone:
          type: boolean
          nullable: true
        show_activities_in_discovery:
          type: boolean
          nullable: true
        show_as_top_fan:
          type: boolean
          nullable: true
        show_top_fans_on_tracks:
          type: boolean
          nullable: true
      additionalProperties: false

    FollowingSearchResult:
      type: object
      required: [id, display_name, is_verified]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean

    FollowingSearchResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, total, query]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/FollowingSearchResult'
            total:
              type: integer
            query:
              type: string

    # ── Track schemas ─────────────────────────────────────────
    TrackStatus:
      type: string
      enum: [processing, ready, failed]

    Tag:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    TagListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    Genre:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Pop

    GenreListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    Track:
      type: object
      required:
        [
          id,
          title,
          status,
          is_public,
          user_id,
          artist_name,
          play_count,
          like_count,
          comment_count,
          repost_count,
          audio_url,
          created_at,
        ]

      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        genre_name:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          maxItems: 10
        duration:
          type: integer
          nullable: true
        file_size:
          type: integer
          nullable: true
        bitrate:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/TrackStatus'
        is_public:
          type: boolean
        is_hidden:
          type: boolean
          default: false
        user_id:
          type: string
          format: uuid
        artist_name:
          type: string
          description: Denormalised display_name of the track owner/uploader.
          example: DJ Karim
        play_count:
          type: integer
        like_count:
          type: integer
        comment_count:
          type: integer
        repost_count:
          type: integer
        is_liked_by_me:
          type: boolean
          description: True when the authenticated viewer has liked this track. Always false for anonymous viewers.
        is_reposted_by_me:
          type: boolean
          description: True when the authenticated viewer has reposted this track. Always false for anonymous viewers.
        is_artist_followed_by_me:
          type: boolean
          description: True when the authenticated viewer follows the track artist. Always false for anonymous viewers.
        audio_url:
          type: string
          format: uri
        stream_url:
          type: string
          format: uri
          nullable: true
        preview_url:
          type: string
          format: uri
          nullable: true
        waveform_url:
          type: string
          format: uri
          nullable: true
        cover_image:
          type: string
          format: uri
          nullable: true
        artists:
          type: string
          nullable: true
        buy_link:
          type: string
          format: uri
          nullable: true
        record_label:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        release_date:
          type: string
