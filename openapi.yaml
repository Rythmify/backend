      description: One queue item placement instruction keyed by queue_item_id.
      properties:
        queue_item_id:
          type: string
          format: uuid
          description: Queue item occurrence identifier as a UUID-formatted string. Use queue_item_id, not track_id.
        position:
          type: integer
          minimum: 1
          description: 1-based target position in the full reordered queue.

    QueueReorderRequest:
      type: object
      required: [items]
      description: Full queue permutation request. items must include every current queue item exactly once.
      properties:
        items:
          type: array
          minItems: 1
          description: Every current queue item exactly once, with unique contiguous positions from 1..N.
          items:
            $ref: '#/components/schemas/QueueReorderInstruction'

    QueueContextRequest:
      type: object
      required: [interaction_type, source_type]
      properties:
        interaction_type:
          allOf:
            - $ref: '#/components/schemas/QueueContextInteractionTypeEnum'
          description: |
            Controls how the resolved context is applied to the current player state.
            Use `play` to start the resolved context immediately and replace the existing
            `context` bucket while preserving `next_up`.
            Use `next_up` to append the resolved items to the end of the `next_up`
            bucket while leaving the current track and existing `context` bucket in
            place.
        source_type:
          allOf:
            - $ref: '#/components/schemas/QueueContextSourceTypeEnum'
          description: |
            Selects which supported resolver should be used.
            This field identifies where tracks should be resolved from, such as a
            `track`, `playlist`, `mix`, `liked_tracks`, or `user_tracks`.
        source_id:
          type: string
          nullable: true
          description: |
            Source identifier for non-user-scoped contexts.
            Required for `track`, `playlist`, `album`, `mix`, `station`, and `genre`.
            Usually omitted or `null` for `liked_tracks`, `listening_history`,
            `reposts`, and `user_tracks`.
            For `source_type=track`, `playlist`, `album`, `station`, and `genre`, use a
            UUID-formatted string.
            Do not assume this field is always a UUID because `mix` may use string ids.
        target_user_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Effective user scope for user-scoped source types.
            Optional for `liked_tracks`, `reposts`, and `user_tracks`; defaults to the
            authenticated user when omitted. Use a UUID-formatted string when provided.
            Should be omitted or `null` for `track`, `playlist`, `album`, `mix`,
            `station`, and `genre`.
            `listening_history` is self-only, so requesting another user's history
            through this endpoint is not allowed.
      example:
        interaction_type: play
        source_type: playlist
        source_id: 4b28f3dd-2875-4811-aaf1-4fda7d3d113c
        target_user_id: null
    # Playback sync schemas
    PlaybackSyncHistoryEventRequest:
      type: object
      required: [track_id, played_at]
      properties:
        track_id:
          type: string
          format: uuid
          description: UUID-formatted string of the track that was played.
          example: e5f6a7b8-c9d0-1234-efab-567890abcdef
        played_at:
          type: string
          format: date-time
          description: |
            Timestamp when the play occurred. Can be in the past for offline sync.
            Must not be more than 7 days in the past.
          example: '2026-04-03T10:45:00Z'
        duration_played_seconds:
          type: integer
          minimum: 0
          description: How many seconds of the track were played. Used for analytics.
          example: 180

    PlaybackSyncCurrentStateRequest:
      type: object
      required: [track_id, position_seconds, state_updated_at]
      properties:
        track_id:
          type: string
          format: uuid
          description: Current track as a UUID-formatted string.
        position_seconds:
          type: number
          format: float
          minimum: 0
        volume:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        queue:
          type: array
          description: Ordered upcoming queue. Accepts legacy track UUID-formatted strings or queue-item objects.
          items:
            $ref: '#/components/schemas/QueueInputItem'
        state_updated_at:
          type: string
          format: date-time
          description: Timestamp when the client last updated this player state.

    PlaybackSyncRequest:
      type: object
      description: At least one of history_events or current_state must be provided.
      properties:
        history_events:
          type: array
          items:
            $ref: '#/components/schemas/PlaybackSyncHistoryEventRequest'
        current_state:
          $ref: '#/components/schemas/PlaybackSyncCurrentStateRequest'

    PlaybackSyncResult:
      type: object
      required:
        [
          history_events_received,
          history_events_recorded,
          history_events_deduplicated,
          current_state_saved,
          current_state_ignored_as_stale,
        ]
      properties:
        history_events_received:
          type: integer
          minimum: 0
        history_events_recorded:
          type: integer
          minimum: 0
        history_events_deduplicated:
          type: integer
          minimum: 0
        current_state_saved:
          type: boolean
        current_state_ignored_as_stale:
          type: boolean
        current_state:
          allOf:
            - $ref: '#/components/schemas/PlayerState'
          nullable: true

    PlaybackSyncResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PlaybackSyncResult'

    ListeningHistoryEntry:
      type: object
      required: [id, track, played_at]
      properties:
        id:
          type: string
          format: uuid
        track:
          $ref: '#/components/schemas/TrackSummary'
        played_at:
          type: string
          format: date-time

    RecentlyPlayedTrackSummary:
      allOf:
        - $ref: '#/components/schemas/TrackSummary'
        - type: object
          required: [tags, is_liked_by_me, is_reposted_by_me, is_artist_followed_by_me]
          properties:
            tags:
              type: array
              maxItems: 10
              items:
                type: string
              example: [house, summer]
            is_liked_by_me:
              type: boolean
              description: True when the authenticated requester has liked this track.
            is_reposted_by_me:
              type: boolean
              description: True when the authenticated requester has reposted this track.
            is_artist_followed_by_me:
              type: boolean
              description: True when the authenticated requester follows the track artist.

    RecentlyPlayedEntry:
      type: object
      required: [track, last_played_at]
      properties:
        track:
          $ref: '#/components/schemas/RecentlyPlayedTrackSummary'
        last_played_at:
          type: string
          format: date-time

    RecentlyPlayedResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/RecentlyPlayedEntry'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    ListeningHistoryResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ListeningHistoryEntry'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    # ── Playlist schemas ──────────────────────────────────────
    CreatePlaylistRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        is_public:
          type: boolean
          default: true

    PlaylistOwnerSummary:
      type: object
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string

    PlaylistTrackItem:
      type: object
      required: [track_id, position, added_at]
      properties:
        track_id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
        added_at:
          type: string
          format: date-time

    Playlist:
      type: object
      required: [playlist_id, owner_user_id, name, is_public, created_at]
      properties:
        playlist_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        track_count:
          type: integer
        like_count:
          type: integer
        cover_image:
          type: string
          format: uri
          nullable: true
        # [FIX-10] Changed from $ref Track to $ref DiscoveryTrack
        preview_track:
          allOf:
            - $ref: '#/components/schemas/DiscoveryTrack'
          nullable: true
          description: |
            First track of the playlist for instant playback from Home screen.
            null if playlist is empty.

    PlaylistDetails:
      allOf:
        - $ref: '#/components/schemas/Playlist'
        - type: object
          properties:
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistTrackItem'

    PlaylistResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Playlist'
        message:
          type: string

    PlaylistGetResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PlaylistDetails'
        message:
          type: string

    PlaylistTracksGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [playlist_id, tracks, pagination]
          properties:
            playlist_id:
              type: string
              format: uuid
            tracks:
              type: array
              items:
                type: object
                required: [track_id, position, added_at]
                properties:
                  track_id:
                    type: string
                    format: uuid
                  position:
                    type: integer
                    minimum: 1
                  added_at:
                    type: string
                    format: date-time
                  title:
                    type: string
                  duration:
                    type: integer
                    nullable: true
                  cover_image:
                    type: string
                    format: uri
                    nullable: true
                  is_public:
                    type: boolean
                  deleted_at:
                    type: string
                    format: date-time
                    nullable: true
                  artist_name:
                    type: string
                    nullable: true
                  artist_id:
                    type: string
                    format: uuid
            pagination:
              type: object
              required: [page, per_page, total_items, total_pages, has_next, has_prev]
              properties:
                page:
                  type: integer
                  minimum: 1
                per_page:
                  type: integer
                  minimum: 1
                total_items:
                  type: integer
                  minimum: 0
                total_pages:
                  type: integer
                  minimum: 0
                has_next:
                  type: boolean
                has_prev:
                  type: boolean
        message:
          type: string

    PlaylistListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, meta]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Playlist'
            meta:
              $ref: '#/components/schemas/ListMeta'
        message:
          type: string

    UpdatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        is_public:
          type: boolean
      additionalProperties: false

    AddTrackToPlaylistRequest:
      type: object
      required: [track_id]
      properties:
        track_id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
          nullable: true
      additionalProperties: false

    ReorderPlaylistTracksRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [track_id, position]
            properties:
              track_id:
                type: string
                format: uuid
              position:
                type: integer
                minimum: 1

    PlaylistEmbedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [embed_url, iframe_html]
          properties:
            embed_url:
              type: string
              format: uri
            iframe_html:
              type: string
        message:
          type: string

    PlaylistSummary:
      type: object
      description: Minimal playlist info for search results.
      required: [id, title, owner]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        owner:
          $ref: '#/components/schemas/PlaylistOwnerSummary'
        track_count:
          type: integer
        created_at:
          type: string
          format: date-time

    # ── Discovery track model (lightweight, used across all discovery) ──
    # [FIX-8] Added repost_count
    DiscoveryTrack:
      type: object
      description: |
        Lightweight track object used across all discovery, feed, and search endpoints.
        artist_name is denormalised to avoid per-item user lookups.
        Use this schema (not Track or FeedTrack) anywhere a compact track is needed.
      required: [id, title, user_id, play_count]
      properties:
        id:
          type: string
          format: uuid
          example: e5f6a7b8-c9d0-1234-efab-567890abcdef
        title:
          type: string
          example: Summer Vibes
        cover_image:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/covers/track1.jpg
        duration:
          type: integer
          nullable: true
          description: Duration in seconds.
          example: 213
        genre_name:
          type: string
          nullable: true
          example: Electronic
        play_count:
          type: integer
          example: 4200
        like_count:
          type: integer
          example: 312
        # [FIX-8] Added
        repost_count:
          type: integer
          nullable: true
          example: 47
        user_id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        artist_name:
          type: string
          nullable: true
          description: Denormalised display_name of the track owner.
          example: DJ Karim
        stream_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/tracks/e5f6a7b8/stream.mp3
        preview_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/tracks/e5f6a7b8/preview.mp3
        created_at:
          type: string
          format: date-time
          example: '2026-03-01T10:00:00Z'

    # [FIX-1][FIX-3][FIX-14] Unified feed item schema replacing FeedTrack in feed endpoints.
    # FeedTrack is kept below for search/trending use but aligned to DiscoveryTrack field names.
    FeedItem:
      type: object
      description: |
        A single item in the Following or Discover feed.
        item_type distinguishes original posts from reposts.
        When item_type = "repost", repost_by is the user who reposted it.
      required: [item_type, track]
      properties:
        item_type:
          type: string
          enum: [track, repost]
          description: |
            track — original upload by a followed user.
            repost — a track reposted by a followed user.
          example: repost
        repost_by:
          nullable: true
          description: |
            The user who performed the repost. Present only when item_type = "repost".
            null when item_type = "track".
          allOf:
            - $ref: '#/components/schemas/RepostByUser'
        reposted_at:
          type: string
          format: date-time
          nullable: true
          description: When the repost occurred. Present only when item_type = "repost".
          example: '2026-04-03T09:15:00Z'
        track:
          $ref: '#/components/schemas/DiscoveryTrack'

    RepostByUser:
      type: object
      description: Minimal user info for the user who performed a repost.
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        display_name:
          type: string
          example: Ahmed Sami
        username:
          type: string
          nullable: true
          example: ahmed_sami
        profile_picture:
          type: string
          format: uri
          nullable: true
          example: https://cdn.rythmify.com/avatars/ahmed.jpg

    FeedResponse:
      type: object
      description: Response for GET /feed and GET /feed/discover.
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedItem'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    # [FIX-14] FeedTrack aligned with DiscoveryTrack field names (cover_image, flat artist_name)
    # Still used by /feed/trending and /search
    FeedTrack:
      type: object
      description: |
        Track with artist summary. Used in trending feed and search results.
        Field names are aligned with DiscoveryTrack (cover_image, artist_name).
      required: [id, title, artist_name, user_id]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        # [FIX-14] Was cover_url — now cover_image (aligned with DiscoveryTrack)
        cover_image:
          type: string
          format: uri
          nullable: true
        # [FIX-14] Was artist.display_name nested object — now flat artist_name string
        artist_name:
          type: string
          nullable: true
          description: Denormalised display_name of the track owner.
        user_id:
          type: string
          format: uuid
        genre_name:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
        play_count:
          type: integer
        like_count:
          type: integer
        repost_count:
          type: integer
          nullable: true
        stream_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time

    TrendingTrack:
      allOf:
        - $ref: '#/components/schemas/FeedTrack'
        - type: object
          properties:
            rank:
              type: integer
              description: Position in trending chart (1-based).
              example: 1
            trend_score:
              type: number
              format: float
              description: Normalised trending score (0–1).
              example: 0.94

    TrendingFeedResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TrendingTrack'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    # [FIX-6][FIX-7] Search response — pagination inside data, per-type meta
    SearchResponse:
      type: object
      required: [data, pagination]
      description: |
        Paginated search results. When type param is provided, only that
        resource type is populated. Use type param + independent limit/offset
        per type for tab-level pagination.
      properties:
        data:
          type: object
          required: [tracks, users, playlists]
          properties:
            tracks:
              type: array
              items:
                $ref: '#/components/schemas/TrackSearchResult'
            users:
              type: array
              items:
                $ref: '#/components/schemas/UserSearchResult'
            playlists:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistSearchResult'
        pagination:
          $ref: '#/components/schemas/ListMeta'

    TrackSearchResult:
      allOf:
        - $ref: '#/components/schemas/FeedTrack'
        - type: object
          properties:
            score:
              type: number
              format: float
              example: 0.92

    UserSearchResult:
      type: object
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        profile_picture:
          type: string
          format: uri
          nullable: true
        follower_count:
          type: integer
        score:
          type: number
          format: float
          example: 0.75

    PlaylistSearchResult:
      allOf:
        - $ref: '#/components/schemas/PlaylistSummary'
        - type: object
          properties:
            score:
              type: number
              format: float
              example: 0.81

    ResolveResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, id, permalink]
          properties:
            type:
              type: string
              enum: [track, user, playlist]
            id:
              type: string
              format: uuid
            permalink:
              type: string
              format: uri

    # ── Discovery & Genre schemas ─────────────────────────────
    DiscoveryMix:
      type: object
      required: [id, label, flavor, track_count, generated_at]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: MIX 1
        # [FIX-12] Removed unused taste_profile value
        flavor:
          type: string
          enum: [listening_history]
          example: listening_history
        genre_name:
          type: string
          nullable: true
        cover_image:
          type: string
          format: uri
          nullable: true
        track_count:
          type: integer
        generated_at:
          type: string
          format: date-time
        preview_track:
          allOf:
            - $ref: '#/components/schemas/DiscoveryTrack'
          nullable: true
          description: |
            First track of this mix for instant playback from Home screen.
            null if mix has no tracks.

    DiscoveryStation:
      type: object
      required: [id, artist_id, artist_name, images, preview_track, track_count]
      example:
        id: d3d8c9a0-8c6f-4a98-a5a4-b5c2d70bc1f1
        artist_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        artist_name: DJ Karim
        images:
          left: https://cdn.rythmify.com/covers/track1.jpg
          center: null
          right: https://cdn.rythmify.com/covers/track2.jpg
        preview_track:
          id: e5f6a7b8-c9d0-1234-efab-567890abcdef
          title: Midnight Run
          cover_image: https://cdn.rythmify.com/covers/track1.jpg
          duration: 213
          genre_name: Electronic
          play_count: 18
          like_count: 8
          repost_count: 3
          user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          artist_name: DJ Karim
          stream_url: https://cdn.rythmify.com/tracks/e5f6a7b8/stream.mp3
          created_at: '2026-03-01T10:00:00Z'
        track_count: 4
      properties:
        id:
          type: string
          format: uuid
        artist_id:
          type: string
          format: uuid
        artist_name:
          type: string
        images:
          type: object
          required: [left, center, right]
          properties:
            left:
              type: string
              format: uri
              nullable: true
            center:
              type: string
              format: uri
              nullable: true
            right:
              type: string
              format: uri
              nullable: true
        preview_track:
          $ref: '#/components/schemas/DiscoveryTrack'
        track_count:
          type: integer

    DiscoveryAlbum:
      type: object
      required: [id, name, owner_id, owner_name, track_count, like_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
        track_count:
          type: integer
        like_count:
          type: integer
        created_at:
          type: string
          format: date-time
        preview_track:
          allOf:
            - $ref: '#/components/schemas/DiscoveryTrack'
          nullable: true
          description: |
            First track in album order (position ASC NULLS LAST, then created_at ASC).
            null if album has no tracks.

    CuratedMixSummary:
      type: object
      required: [id, label, description, track_count, refreshes_at, preview_track]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: Daily Drops
        description:
          type: string
        track_count:
          type: integer
        refreshes_at:
          type: string
          format: date-time
        cover_url:
          type: string
          format: uri
          nullable: true
        preview_track:
          $ref: '#/components/schemas/DiscoveryTrack'

    EmergingArtist:
      type: object
      required: [id, display_name, play_velocity]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        profile_picture:
          type: string
          format: uri
          nullable: true
        top_genre:
          type: string
          nullable: true
        play_velocity:
          type: integer
        track_count:
          type: integer

    # [FIX-15] Added is_following to SuggestedUser
    SuggestedUser:
      type: object
      required: [id, display_name, is_verified, follower_count, suggestion_source, is_following]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean
        follower_count:
          type: integer
        mutual_count:
          type: integer
          nullable: true
          description: Number of mutual follows. Present only when suggestion_source = "mutual".
        suggestion_source:
          type: string
          enum: [mutual, popular]
        # [FIX-15]
        is_following:
          type: boolean
          description: |
            Whether the authenticated user already follows this person.
            Always false for suggestions by definition, but included for
            consistency when this schema is reused in other contexts.
          example: false

    # [FIX-15] Added is_following to SuggestedArtist
    SuggestedArtist:
      type: object
      required: [id, display_name, is_verified, follower_count, is_following]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        username:
          type: string
          nullable: true
        profile_picture:
          type: string
          format: uri
          nullable: true
        is_verified:
          type: boolean
        follower_count:
          type: integer
        top_genre:
          type: string
          nullable: true
        # [FIX-15]
        is_following:
          type: boolean
          description: Whether the authenticated user already follows this artist.
          example: false

    GenreDetail:
      type: object
      required: [id, name, track_count, artist_count, playlist_count, album_count]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        track_count:
          type: integer
        artist_count:
          type: integer
        playlist_count:
          type: integer
        album_count:
          type: integer

    GenreArtist:
      type: object
