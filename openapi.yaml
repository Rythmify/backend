        '409':
          description: A profile for this platform already exists for this user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: RESOURCE_ALREADY_EXISTS
                  message: A profile for the instagram platform already exists.
        '500':
          $ref: '#/components/responses/InternalError'

  /users/me/web-profiles/{profile_id}:
    delete:
      tags: [Users]
      summary: Remove a linked social / web profile
      description: |
        Deletes a specific web profile entry by its UUID. Only the owner of
        the profile entry can delete it.
      operationId: deleteWebProfile
      security:
