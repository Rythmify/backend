            block_reason:
              allOf:
                - $ref: '#/components/schemas/PlaybackBlockReason'
              nullable: true

    QueueBucketEnum:
      type: string
      enum: [next_up, context]
      description: |
        Identifies which playback bucket a queue item belongs to.
        This field controls queue placement and ordering, not provenance.
        `next_up` is the user-prioritized bucket that plays before the passive context.
        `context` is the passive playback bucket behind the current item and any `next_up`
        items.

    QueueSourceTypeEnum:
      type: string
      enum:
        [
          track,
          playlist,
          album,
          mix,
          station,
          genre,
          liked_tracks,
          listening_history,
          reposts,
          user_tracks,
          system,
        ]
      description: |
        Describes where a queue item came from.
        This field is provenance metadata, not queue placement.
        `track` means an individually queued track.
        Context items may come from playlists, albums, mixes, stations, genres,
        liked tracks, listening history, reposts, or user uploads.
        User-scoped context items store the effective user id in `source_id`.
        A context inserted into `queue_bucket=next_up` still keeps its original
        `source_type` such as `genre` or `playlist`.
        `system` is reserved for legacy or system-managed queue sources.

    QueueContextInteractionTypeEnum:
      type: string
      enum: [play, next_up]
      description: |
        Controls how the resolved context is applied.
        `play` starts the resolved context immediately, sets the current track to the
        first resolved track, preserves the existing `next_up` bucket, and replaces the
        old `context` bucket.
        `next_up` preserves the current track, appends the resolved items to the end of
        the `next_up` bucket, and leaves the existing `context` bucket behind them.

    QueueContextSourceTypeEnum:
      type: string
      enum:
        [
          track,
          playlist,
          album,
          mix,
          station,
          genre,
          liked_tracks,
          listening_history,
          reposts,
          user_tracks,
        ]
      description: |
        Allowed resolver source types for `POST /me/player/queue/context`.
        - `track`: queue one direct track into `next_up` by `source_id`. This source
          type only supports `interaction_type=next_up`.
        - `playlist`: resolve tracks from a playlist by `source_id`.
        - `album`: resolve tracks from an album by `source_id`.
        - `mix`: resolve tracks from a mix by `source_id`. Mix ids may be non-UUID
          strings.
        - `station`: resolve tracks from a station by `source_id`.
        - `genre`: resolve tracks from a genre by `source_id`.
        - `liked_tracks`: resolve a user's liked tracks. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.
        - `listening_history`: resolve the authenticated user's listening history.
          This source is self-only.
        - `reposts`: resolve a user's reposted tracks. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.
        - `user_tracks`: resolve tracks uploaded by a user. Uses `target_user_id` when
          provided and otherwise defaults to the authenticated user.

    LegacyQueueTrackId:
      type: string
      format: uuid
      description: Legacy queue input format accepted for backward compatibility.

    QueueItemInput:
      type: object
      required: [track_id]
      properties:
        queue_item_id:
          type: string
          format: uuid
          description: Optional stable identifier for this queue occurrence as a UUID-formatted string. Generated when omitted.
        track_id:
          type: string
          format: uuid
          description: Track identifier as a UUID-formatted string.
        queue_bucket:
          allOf:
            - $ref: '#/components/schemas/QueueBucketEnum'
          default: next_up
          description: |
            Playback bucket where this queue item should live.
            Use `next_up` versus `context` for ordering and grouping, not for source
            provenance.
        source_type:
          allOf:
            - $ref: '#/components/schemas/QueueSourceTypeEnum'
          default: track
          description: |
            Provenance for this queue item.
            This describes the resolved source context such as `playlist`, `genre`, or
            `liked_tracks`; it does not describe queue placement.
        source_id:
          type: string
          nullable: true
          description: |
            Source identifier used to resolve the queue item.
            This may be a UUID, a user id, a mix key, or `null` for direct track queueing.
            For user-scoped contexts in responses, this stores the effective user id.
        source_title:
          type: string
          nullable: true
          description: |
            Human-readable source label for FE display.
            Combine this with `source_type` when rendering provenance badges or subtitles.
        source_position:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Order of this item inside the resolved source context when that ordering is
            meaningful.
            Use this for provenance display, not for overall queue placement.
        added_at:
          type: string
          format: date-time
          description: Optional timestamp for when the queue item was created. Generated when omitted.
      example:
        queue_item_id: e85d14f1-98eb-462d-b3f0-4f7f78cc8c7c
        track_id: 91d42a97-cb47-429e-b9e3-88fbff4e2680
        queue_bucket: context
        source_type: playlist
        source_id: 4b28f3dd-2875-4811-aaf1-4fda7d3d113c
        source_title: My Running Mix
        source_position: 5
        added_at: '2026-04-18T20:00:19.000Z'

    QueueInputItem:
      oneOf:
        - $ref: '#/components/schemas/LegacyQueueTrackId'
        - $ref: '#/components/schemas/QueueItemInput'
      description: Accepts either a legacy track UUID or a rich queue-item object.

    QueueItem:
      type: object
      required:
        [
          queue_item_id,
          track_id,
          queue_bucket,
          source_type,
          source_id,
          source_title,
          source_position,
          added_at,
          stream_url,
          track_title,
          artist_name,
          duration,
        ]
      properties:
        queue_item_id:
          type: string
          format: uuid
          description: Queue item occurrence identifier as a UUID-formatted string.
        track_id:
          type: string
          format: uuid
          description: Track identifier as a UUID-formatted string.
        queue_bucket:
          allOf:
            - $ref: '#/components/schemas/QueueBucketEnum'
          description: |
            Playback bucket where this queue item now lives.
            Use this field for playback ordering and queue UI grouping.
        source_type:
          allOf:
            - $ref: '#/components/schemas/QueueSourceTypeEnum'
          description: |
            Provenance of the returned queue item.
            This is not the same as `queue_bucket`; a `playlist` or `genre` item can
            still live in `queue_bucket=next_up`.
        source_id:
          type: string
          nullable: true
          description: |
            Identifier for the resolved source represented by this queue item.
            This may be a playlist id, album id, mix key, genre id, station id, effective
            user id, or `null` for direct track queueing.
        source_title:
          type: string
          nullable: true
          description: |
            Human-readable source label for FE rendering.
            Use this together with `source_type` when showing provenance to users.
        source_position:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Order of this item inside the resolved source context when relevant.
            This does not indicate whether the item is in `next_up` or `context`.
        added_at:
          type: string
          format: date-time
        stream_url:
          type: string
          nullable: true
          description: Playable stream URL derived from the queued track id when the track still exists.
        track_title:
          type: string
          nullable: true
          description: Convenience track title derived from `track_id`.
        artist_name:
          type: string
          nullable: true
          description: Convenience artist display name derived from `track_id`.
        duration:
          type: integer
          nullable: true
          description: Convenience duration derived from `track_id`.
      example:
        queue_item_id: e85d14f1-98eb-462d-b3f0-4f7f78cc8c7c
        track_id: 91d42a97-cb47-429e-b9e3-88fbff4e2680
        queue_bucket: context
        source_type: playlist
        source_id: 4b28f3dd-2875-4811-aaf1-4fda7d3d113c
        source_title: My Running Mix
        source_position: 5
        added_at: '2026-04-18T20:00:19.000Z'
        stream_url: https://cdn.rythmify.app/tracks/91d42a97-cb47-429e-b9e3-88fbff4e2680/stream.mp3
        track_title: Runaway Pulse
        artist_name: Echo Atlas
        duration: 219

