        message:
          type: string
          example: Subscription canceled successfully.
      required:
        - data

    PaymentStatus:
      type: string
      description: Current payment status of a subscription transaction.
      enum:
        - pending
        - paid
        - failed
      example: paid

    SubscriptionTransaction:
      type: object
      properties:
        transaction_id:
          type: integer
          description: Internal transaction ID.
          example: 27
        user_subscription_id:
          type: integer
          description: Linked user subscription ID.
          example: 18
        amount:
          type: string
          description: Decimal transaction amount represented as a string.
          example: '4.99'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
