          description: Timestamp when the transaction was marked as paid.
          example: '2026-03-01T09:35:00Z'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the transaction record was created.
          example: '2026-03-01T09:30:00Z'
      required:
        - transaction_id
        - user_subscription_id
        - amount
        - payment_method
        - payment_status
        - paid_at
        - created_at

    SubscriptionTransactionListMeta:
      type: object
