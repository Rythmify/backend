                $ref: '#/components/schemas/WebProfileListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Users]
      summary: Add a new social / web profile link
      description: |
        Adds a new external social or website link to the user's profile.

        - The `url` must be a valid `https://` URL.
        - Only one entry per `platform` is allowed per user.
      operationId: addWebProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWebProfileRequest'
      responses:
        '201':
          description: Web profile link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebProfileCreatedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
