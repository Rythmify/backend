                  repost_count: 10
                  created_at: '2026-03-06T10:00:00Z'
                  updated_at: '2026-03-06T11:00:00Z'
                message: Playlist updated successfully.

        '400':
          $ref: '#/components/responses/ValidationError'

        '401':
