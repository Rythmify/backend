        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      description: |
        Updates the body text of a comment owned by the authenticated user.

        **Database requirement:** The comments table must have an `updated_at TIMESTAMPTZ` column.
        Backend must update this timestamp on every PATCH to track comment edits.
      tags: [Comments]
      summary: Edit a comment
      operationId: updateComment
      parameters:
        - $ref: '#/components/parameters/CommentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not the comment author.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: |
        Deletes a comment and all its nested replies (cascade delete).

        **Database requirement:** The foreign key `parent_comment_id` must use `ON DELETE CASCADE`.
        Alternative: handle cascade explicitly in application code (delete all replies where parent_comment_id = :id first, then delete the parent).
      tags: [Comments]
      summary: Delete a comment
      operationId: deleteComment
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204':
          description: Comment deleted — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /comments/{comment_id}/replies:
    get:
      description: |
        Returns paginated replies to the specified top-level comment.

        Replies are always ordered by creation time (oldest first), with id as final tie-breaker.
        This ensures deterministic, consistent pagination across requests.
      tags: [Comments]
      summary: List replies to a comment
      operationId: getCommentReplies
      parameters:
