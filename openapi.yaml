        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/TrackProcessingFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /tracks/{track_id}/playback-state:
    get:
      description: Returns the playback access level for the requesting user without triggering a play event.
      tags: [Tracks]
      summary: Check playability for the requesting user
      operationId: getPlaybackState
      security: []
      parameters:
        - $ref: '#/components/parameters/TrackId'
      responses:
        '200':
          description: Playback access level returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaybackStateResponse'
        '404':
