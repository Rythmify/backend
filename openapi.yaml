    post:
      description: |
        Persists the authenticated user's current player queue and resume position.

        After saving player state, the backend also performs a best-effort analytics enrichment:
        it looks for the most recent matching listening-history entry for the same user and track
        and updates that row's stored progress using the furthest known position reached.

        Notes:
