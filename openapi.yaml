          description: Paginated likers list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /albums/{album_id}/repost:
    post:
      description: Reposts the specified album to the authenticated user's profile.
      tags: [Reposts]
      summary: Repost an album
      operationId: repostAlbum
      parameters:
        - name: album_id
          in: path
          required: true
          schema: { type: string, format: uuid }
