        auto_renew:
          type: boolean
          description: Whether the subscription will renew automatically.
          example: false
        end_date:
          type: string
          format: date
          nullable: true
          description: Date when premium access ends.
          example: '2026-03-31'
      required:
        - user_subscription_id
