        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/player/state:
    get:
      description: Retrieves the authenticated user's last persisted player state.
      tags: [Tracks]
      summary: Get last saved player state
      operationId: getPlayerState
      responses:
        '200':
          description: Player state returned. data is null if no state saved yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      description: Persists the authenticated user's current player queue and position.
      tags: [Tracks]
      summary: Save persistent player state
      operationId: savePlayerState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePlayerStateRequest'
      responses:
