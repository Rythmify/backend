        '200':
          description: Already reposted — no change.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '201':
          description: Album reposted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumRepostResponse'
        '400':
          description: Cannot repost own album.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      description: Removes the authenticated user's repost of the specified album.
      tags: [Reposts]
      summary: Remove an album repost
      operationId: removeAlbumRepost
      parameters:
        - name: album_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Repost removed — no body.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /albums/{album_id}/reposters:
    get:
      description: Returns a paginated list of users who reposted the specified album.
      tags: [Reposts]
      summary: List users who reposted an album
      operationId: getAlbumReposters
      parameters:
        - name: album_id
          in: path
          required: true
