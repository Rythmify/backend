        auto_renew:
          type: boolean
          description: Whether the subscription will renew automatically.
          example: true
        start_date:
          type: string
          format: date
          description: Subscription activation date.
          example: '2026-03-06'
        end_date:
          type: string
          format: date
          nullable: true
          description: Date when premium access ends.
          example: '2026-04-05'
      required:
        - user_subscription_id
        - status
        - auto_renew
        - start_date
        - end_date

    MockConfirmSubscriptionResponse:
      type: object
      properties:
        data:
