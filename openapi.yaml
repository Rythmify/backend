  /playlists:
    post:
      tags: [Playlists]
      summary: Create a playlist
      description: |
        Creates a new playlist (set) for the authenticated user.

        Notes:
        - If `is_public=false`, the playlist is treated as "secret/private" (shareable by token/link).
        - Playlist count limits may apply depending on the user's subscription plan.
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistRequest'

      responses:
        '201':
          description: Playlist created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistResponse'
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: 'Gym Mix'
                  slug: 'gym-mix'
                  description: 'High energy tracks'
                  is_public: true
                  cover_image: 'https://cdn.rythmify.com/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa/cover.jpg'
                  subtype: 'playlist'
                  release_date: '2026-03-06'
                  genre_id: 6c6d6f9f-2e4a-4c0e-84e6-1738a29edb8d
                  track_count: 0
                  like_count: 0
                  repost_count: 0
                  created_at: '2026-03-06T10:00:00Z'
                  updated_at: '2026-03-06T10:00:00Z'
                message: 'Playlist created successfully.'

        '400':
          $ref: '#/components/responses/ValidationError'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '422':
          description: Business rule violation (e.g., playlist limit reached).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BUSINESS_LIMIT_REACHED
                  message: Playlist limit reached for your current plan.

        '429':
          $ref: '#/components/responses/RateLimited'

    get:
      tags: [Playlists]
      summary: List playlists
      description: |
        Returns a paginated list of playlists.

        By default, this returns **public** playlists.

        To list the authenticated user's library, set `mine=true` and include Bearer auth.

        Filters:
        - `filter=created|liked` applies only when `mine=true`.
        - `is_album_view=true` returns non-regular playlists (all subtypes except `playlist`).
        - `subtype` filters by one subtype when `is_album_view` is not used.
      operationId: listPlaylists
      security: [] # public by default; auth required only when mine=true

      parameters:
        - name: mine
          in: query
          required: false
          description: If true, returns the authenticated user's playlists (public + private).
          schema:
            type: boolean
            default: false

        - name: filter
          in: query
          required: false
          description: Library filter for authenticated requests (`mine=true`). Defaults to `created` when omitted.
          schema:
            type: string
            enum: [created, liked]
            default: created

        - name: q
          in: query
          required: false
          description: Search by playlist name (simple contains match).
          schema:
            type: string
            maxLength: 100

        - name: subtype
          in: query
          required: false
          description: Filter by playlist subtype. Ignored when `is_album_view=true`.
          schema:
            type: string
            enum: [playlist, album, ep, single, compilation]

        - name: is_album_view
          in: query
          required: false
          description: If true, returns all non-playlist subtypes (album/ep/single/compilation).
          schema:
            type: boolean
            default: false

        - name: limit
          in: query
          required: false
          description: Page size (server-clamped to 1..50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20

        - name: offset
          in: query
          required: false
          description: Pagination offset.
          schema:
            type: integer
            minimum: 0
            default: 0

      responses:
        '200':
          description: Playlists returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistListResponse'

        '400':
          $ref: '#/components/responses/ValidationError'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '429':
          $ref: '#/components/responses/RateLimited'

  /playlists/{playlist_id}:
    get:
      tags: [Playlists]
      summary: Get playlist details
      description: |
        Returns playlist metadata and its tracks in order.

        `cover_image` is always included in the response.
        If no custom playlist cover exists, the backend may fall back to the first track cover.

        Access rules:
        - Public playlists: accessible to anyone.
        - Private (secret) playlists: accessible if either:
          1) the requester is the owner (via Bearer token), OR
          2) `secret_token` is provided.

        Response note:
        - `secret_token` is returned only when the requester is the playlist owner.
        - For non-owners, `secret_token` is omitted from the response.
        - For private playlists accessed via query token, the token is used for authorization only and is not returned for non-owners.
      operationId: getPlaylistById
      security: [] # public endpoint (Authorization header may still be sent optionally)

      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

        - name: secret_token
          in: query
          required: false
          description: Required only to access private/secret playlists when not authenticated as the owner.
          schema:
            type: string

        - name: include_tracks
          in: query
          required: false
          description: If false, returns only playlist metadata (without tracks array). If true, `tracks` is included.
          schema:
            type: boolean
            default: true

      responses:
        '200':
          description: Playlist returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistGetResponse'
              example:
                data:
                  playlist_id: 8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa
                  owner_user_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  name: 'Gym Mix'
                  slug: 'gym-mix'
                  description: 'High energy tracks'
                  is_public: true
                  cover_image: 'https://cdn.rythmify.com/playlists/8d5a8f6c-7b4a-4c7a-9c25-9a9f1e3a12aa/cover.jpg'
                  subtype: 'playlist'
                  track_count: 2
                  like_count: 15
                  repost_count: 1
                  created_at: '2026-03-06T10:00:00Z'
                  updated_at: '2026-03-06T10:30:00Z'
                  tracks:
                    - track_id: e5f6a7b8-c9d0-1234-efab-567890abcdef
                      position: 1
                      added_at: '2026-03-06T10:01:00Z'
                    - track_id: 11111111-c9d0-1234-efab-567890abcdef
                      position: 2
                      added_at: '2026-03-06T10:03:00Z'
                message: Playlist details fetched successfully.

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          description: Not allowed to access this playlist (private and missing permission/token).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PRIVATE_PLAYLIST_ACCESS_DENIED
                  message: This playlist is private.

        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: PLAYLIST_NOT_FOUND
                  message: Playlist not found.

        '429':
          $ref: '#/components/responses/RateLimited'

    patch:
      tags: [Playlists]
      summary: Update playlist
      description: |
        Updates playlist metadata for the authenticated owner.

        Editable fields:
        - `name`
        - `description`
        - `is_public`
        - `cover_image`
        - `subtype`
        - `slug`
        - `release_date`
        - `genre_id`
        - `tags`

        Notes:
        - Only the playlist owner can update a playlist.
        - If `is_public=false`, the playlist becomes secret/private and gets a secret token if missing.
        - If `is_public=true`, any existing secret token is preserved (not cleared).
        - For `subtype` values `album`, `ep`, `single`, or `compilation`, `release_date` is required (either already stored or provided in this request).
        - Send `genre_id` as `null` (or empty form value) to clear the existing genre.
        - When `tags` is provided, existing playlist tags are replaced.
        - If no custom playlist cover exists after update, response `cover_image` falls back to the first track cover (if available).
        - To remove an uploaded cover, send `remove_cover_image=true` (or `cover_image` as an empty form value).
      operationId: updatePlaylist
      parameters:
        - name: playlist_id
          in: path
          required: true
          description: Playlist ID.
          schema:
            type: string
            format: uuid

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdatePlaylistRequest'

      responses:
        '200':
          description: Playlist updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistResponse'
              example:
